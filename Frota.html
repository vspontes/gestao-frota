<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Gestão de Frota</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:#f3f4f6;min-height:100vh}
  .hidden{display:none!important}
  /* LOGIN */
  #login-screen{min-height:100vh;background:linear-gradient(135deg,#1e3a5f,#2563eb);display:flex;align-items:center;justify-content:center;padding:16px}
  .login-box{background:#fff;border-radius:16px;padding:36px;width:100%;max-width:340px;box-shadow:0 8px 32px rgba(0,0,0,.25)}
  .login-box h2{color:#1e3a5f;margin:8px 0 4px;font-size:22px}
  .login-box p{color:#6b7280;font-size:13px;margin-bottom:20px}
  /* LAYOUT */
  #app{display:flex;min-height:100vh}
  #sidebar{width:210px;background:#1e3a5f;flex-shrink:0;display:flex;flex-direction:column;min-height:100vh;position:fixed;top:0;left:0;z-index:50}
  #main{margin-left:210px;flex:1;padding:24px;overflow-y:auto}
  @media(max-width:640px){#sidebar{width:100%;height:56px;flex-direction:row;align-items:center;min-height:unset;position:fixed;top:0;z-index:50;padding:0 12px}#main{margin-left:0;margin-top:56px;padding:16px}#sidebar nav{display:none}#sidebar .sidebar-footer{display:none}#sidebar .sidebar-header{display:flex;align-items:center;gap:10px;flex:1}}
  .sidebar-header{padding:20px 16px 14px;border-bottom:1px solid #2d4f7c}
  .sidebar-header .title{color:#fff;font-weight:700;font-size:14px;margin-top:4px}
  .sidebar-header .sub{color:#93c5fd;font-size:11px}
  nav{flex:1;padding:10px 8px}
  .nav-btn{width:100%;background:transparent;color:#93c5fd;border:none;border-radius:8px;padding:10px 12px;cursor:pointer;display:flex;align-items:center;gap:10px;font-size:13px;font-weight:400;margin-bottom:2px;text-align:left;transition:background .15s}
  .nav-btn.active{background:#2563eb;color:#fff;font-weight:700}
  .sidebar-footer{padding:10px 8px;border-top:1px solid #2d4f7c}
  /* CARDS */
  .card{background:#fff;border-radius:10px;padding:16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.07)}
  .card.accent-green{border-left:4px solid #10b981}
  .card.accent-yellow{border-left:4px solid #f59e0b}
  .card.accent-red{border-left:4px solid #ef4444}
  .card.accent-blue{border-left:4px solid #2563eb}
  .stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-bottom:24px}
  .stat-card{background:#fff;border-radius:10px;padding:14px;display:flex;align-items:center;gap:12px;box-shadow:0 1px 3px rgba(0,0,0,.07)}
  .fleet-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
  /* FORMS */
  label{display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:4px}
  input,select,textarea{width:100%;padding:8px 10px;border:1px solid #d1d5db;border-radius:8px;font-size:14px;font-family:inherit;background:#fff}
  input:focus,select:focus{outline:none;border-color:#2563eb}
  .field{margin-bottom:12px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  /* BUTTONS */
  .btn{cursor:pointer;border:none;border-radius:8px;font-weight:600;display:inline-flex;align-items:center;gap:6px;font-family:inherit;transition:opacity .15s;font-size:14px;padding:8px 18px}
  .btn:hover{opacity:.85}
  .btn-primary{background:#2563eb;color:#fff}
  .btn-danger{background:#ef4444;color:#fff}
  .btn-ghost{background:transparent;color:#2563eb;border:1.5px solid #2563eb}
  .btn-sm{padding:5px 12px;font-size:13px}
  .btn-block{width:100%;justify-content:center}
  /* MODAL */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:12px}
  .modal-box{background:#fff;border-radius:12px;padding:24px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto}
  .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
  .modal-header h3{font-size:17px;color:#1e3a5f}
  .modal-close{background:none;border:none;font-size:24px;cursor:pointer;color:#6b7280;line-height:1}
  .modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:12px}
  /* MISC */
  .badge{border-radius:20px;padding:2px 10px;font-size:12px;font-weight:600}
  .page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
  .page-header h2{color:#1e3a5f;font-size:20px}
  .empty{color:#9ca3af;font-size:14px;padding:20px 0}
  .row-actions{display:flex;gap:6px;align-items:flex-start;flex-shrink:0}
  .card-row{display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px}
  .toast{position:fixed;bottom:20px;right:20px;background:#1e3a5f;color:#fff;padding:12px 20px;border-radius:10px;font-size:14px;z-index:999;opacity:0;transition:opacity .3s}
  .toast.show{opacity:1}
  .loading{text-align:center;padding:40px;color:#6b7280;font-size:15px}
  .filter-bar{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
  .total-badge{background:#eff6ff;border-radius:8px;padding:7px 16px;font-weight:700;color:#2563eb;font-size:15px}
  .doc-item{margin-bottom:12px;border:1px solid #e5e7eb;border-radius:8px;padding:10px}
  .doc-item img{max-width:100%;border-radius:6px;margin-top:6px}
</style>
</head>
<body>

<!-- LOGIN -->

<div id="login-screen">
  <div class="login-box">
    <div style="font-size:40px;text-align:center">🚗</div>
    <h2 style="text-align:center">Gestão de Frota</h2>
    <p style="text-align:center">Faça login para continuar</p>
    <div class="field"><label>Usuário</label><input id="login-user" placeholder="admin" onkeydown="if(event.key==='Enter')doLogin()"/></div>
    <div class="field"><label>Senha</label><input id="login-pass" type="password" placeholder="••••••" onkeydown="if(event.key==='Enter')doLogin()"/></div>
    <p id="login-err" style="color:#ef4444;font-size:13px;margin-bottom:8px;display:none">Usuário ou senha incorretos.</p>
    <button class="btn btn-primary btn-block" onclick="doLogin()">Entrar</button>
    <p style="color:#9ca3af;font-size:12px;text-align:center;margin-top:10px">admin / frota123</p>
  </div>
</div>

<!-- APP -->

<div id="app" class="hidden">
  <div id="sidebar">
    <div class="sidebar-header">
      <div style="font-size:24px">🚗</div>
      <div class="title">Gestão de Frota</div>
      <div class="sub">Painel do Proprietário</div>
    </div>
    <nav>
      <button class="nav-btn active" onclick="goTo('dashboard')" id="nav-dashboard">📊 Dashboard</button>
      <button class="nav-btn" onclick="goTo('veiculos')" id="nav-veiculos">🚗 Veículos</button>
      <button class="nav-btn" onclick="goTo('motoristas')" id="nav-motoristas">👤 Motoristas</button>
      <button class="nav-btn" onclick="goTo('pagamentos')" id="nav-pagamentos">💰 Pagamentos</button>
      <button class="nav-btn" onclick="goTo('manutencoes')" id="nav-manutencoes">🔧 Manutenções</button>
      <button class="nav-btn" onclick="goTo('multas')" id="nav-multas">🚨 Multas</button>
    </nav>
    <div class="sidebar-footer">
      <button class="nav-btn" onclick="doLogout()">🚪 Sair</button>
    </div>
  </div>
  <div id="main">
    <div id="page-dashboard"></div>
    <div id="page-veiculos" class="hidden"></div>
    <div id="page-motoristas" class="hidden"></div>
    <div id="page-pagamentos" class="hidden"></div>
    <div id="page-manutencoes" class="hidden"></div>
    <div id="page-multas" class="hidden"></div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCiyTqzSeCPG_SPaSqe7RFDbuYGO15RAj8",
  authDomain: "frota-carros-67e9e.firebaseapp.com",
  projectId: "frota-carros-67e9e",
  storageBucket: "frota-carros-67e9e.firebasestorage.app",
  messagingSenderId: "708276056895",
  appId: "1:708276056895:web:890c4f40df6b8d961d198a"
};

const firebase = initializeApp(firebaseConfig);
const db = getFirestore(firebase);

// ── STATE ──────────────────────────────────────────────────────────────────
let state = { carros:[], motoristas:[], pagamentos:[], manutencoes:[], multas:[] };
let currentPage = 'dashboard';

// ── UTILS ──────────────────────────────────────────────────────────────────
const fmt = d => d ? new Date(d+'T12:00:00').toLocaleDateString('pt-BR') : '—';
const todayStr = () => new Date().toISOString().split('T')[0];
const $ = id => document.getElementById(id);
const toast = msg => { const t=$('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500); };

function fileToBase64(file){ return new Promise(r=>{ const fr=new FileReader(); fr.onload=e=>r({name:file.name,type:file.type,data:e.target.result}); fr.readAsDataURL(file); }); }

// ── FIREBASE HELPERS ───────────────────────────────────────────────────────
async function fbAdd(col, data){ const ref = await addDoc(collection(db,col),{...data,criadoEm:new Date().toISOString()}); return ref.id; }
async function fbDel(col, id){ await deleteDoc(doc(db,col,id)); }
async function fbUpd(col, id, data){ await updateDoc(doc(db,col,id),data); }
function fbListen(col, cb){
  const q = query(collection(db,col));
  return onSnapshot(q, snap=>{ const docs=[]; snap.forEach(d=>docs.push({id:d.id,...d.data()})); cb(docs); });
}

// ── AUTH ───────────────────────────────────────────────────────────────────
window.doLogin = () => {
  const u=$('login-user').value.trim(), s=$('login-pass').value;
  if(u==='admin'&&s==='frota123'){
    $('login-screen').classList.add('hidden');
    $('app').classList.remove('hidden');
    initListeners();
    goTo('dashboard');
  } else { $('login-err').style.display='block'; }
};
window.doLogout = () => { $('app').classList.add('hidden'); $('login-screen').classList.remove('hidden'); };

// ── LISTENERS ──────────────────────────────────────────────────────────────
function initListeners(){
  fbListen('carros', d=>{ state.carros=d; renderPage(); });
  fbListen('motoristas', d=>{ state.motoristas=d; renderPage(); });
  fbListen('pagamentos', d=>{ state.pagamentos=d; renderPage(); });
  fbListen('manutencoes', d=>{ state.manutencoes=d; renderPage(); });
  fbListen('multas', d=>{ state.multas=d; renderPage(); });
}

// ── NAVIGATION ─────────────────────────────────────────────────────────────
window.goTo = (page) => {
  currentPage = page;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  $('nav-'+page)?.classList.add('active');
  ['dashboard','veiculos','motoristas','pagamentos','manutencoes','multas'].forEach(p=>{
    $('page-'+p).classList.toggle('hidden', p!==page);
  });
  renderPage();
};

function renderPage(){
  if(currentPage==='dashboard') renderDashboard();
  else if(currentPage==='veiculos') renderVeiculos();
  else if(currentPage==='motoristas') renderMotoristas();
  else if(currentPage==='pagamentos') renderPagamentos();
  else if(currentPage==='manutencoes') renderManutencoes();
  else if(currentPage==='multas') renderMultas();
}

// ── MODAL ──────────────────────────────────────────────────────────────────
function openModal(title, bodyHTML, onSave){
  const existing = $('modal-overlay'); if(existing) existing.remove();
  const div = document.createElement('div');
  div.id='modal-overlay'; div.className='modal-overlay';
  div.innerHTML=`<div class="modal-box">
    <div class="modal-header"><h3>${title}</h3><button class="modal-close" onclick="closeModal()">×</button></div>
    <div id="modal-body">${bodyHTML}</div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" id="modal-save-btn">Salvar</button>
    </div>
  </div>`;
  document.body.appendChild(div);
  $('modal-save-btn').onclick = onSave;
}
window.closeModal = () => { const m=$('modal-overlay'); if(m) m.remove(); };

// ── DOCS MODAL ─────────────────────────────────────────────────────────────
window.verDocs = (docsJSON) => {
  const docs = JSON.parse(docsJSON);
  const body = docs.length===0 ? '<p class="empty">Nenhum documento.</p>' :
    docs.map(d=>`<div class="doc-item"><b style="font-size:13px">${d.name}</b>${d.type.startsWith('image/')?`<img src="${d.data}" alt="${d.name}"/>`:`<br><a href="${d.data}" download="${d.name}" style="color:#2563eb;font-size:13px">⬇ Baixar PDF</a>`}</div>`).join('');
  const div=document.createElement('div'); div.id='modal-overlay'; div.className='modal-overlay';
  div.innerHTML=`<div class="modal-box"><div class="modal-header"><h3>Documentos</h3><button class="modal-close" onclick="closeModal()">×</button></div>${body}</div>`;
  document.body.appendChild(div);
};

// ══════════════════════════════════════════════════════════════════════════════
// DASHBOARD
// ══════════════════════════════════════════════════════════════════════════════
function renderDashboard(){
  const {carros,motoristas,pagamentos,manutencoes,multas}=state;
  const totalRec = pagamentos.reduce((a,p)=>a+Number(p.valor||0),0);
  const semMot = carros.filter(c=>!c.motorista_id).length;
  const multPend = multas.filter(m=>!m.pago).length;
  const stats=[
    {label:'Veículos',value:carros.length,emoji:'🚗',color:'#2563eb'},
    {label:'Com Motorista',value:carros.length-semMot,emoji:'✅',color:'#10b981'},
    {label:'Sem Motorista',value:semMot,emoji:'⚠️',color:'#f59e0b'},
    {label:'Total Recebido',value:`R$ ${totalRec.toFixed(2).replace('.',',')}`,emoji:'💰',color:'#8b5cf6'},
    {label:'Manutenções',value:manutencoes.length,emoji:'🔧',color:'#06b6d4'},
    {label:'Multas Pendentes',value:multPend,emoji:'🚨',color:'#ef4444'},
  ];
  $('page-dashboard').innerHTML=`
    <h2 style="color:#1e3a5f;margin-bottom:16px">Dashboard</h2>
    <div class="stats-grid">${stats.map(s=>`<div class="stat-card"><span style="font-size:28px">${s.emoji}</span><div><div style="font-size:20px;font-weight:700;color:${s.color}">${s.value}</div><div style="font-size:12px;color:#6b7280">${s.label}</div></div></div>`).join('')}</div>
    <h3 style="color:#1e3a5f;margin-bottom:12px">Frota</h3>
    ${carros.length===0?'<p class="empty">Nenhum veículo cadastrado ainda.</p>':''}
    <div class="fleet-grid">${carros.map(c=>{
      const mot=motoristas.find(m=>m.id===c.motorista_id);
      const total=pagamentos.filter(p=>p.carro_id===c.id).reduce((a,p)=>a+Number(p.valor||0),0);
      return `<div class="card ${mot?'accent-green':'accent-yellow'}">
        <div style="font-weight:700">${c.modelo}</div>
        <div style="font-size:13px;color:#6b7280">${c.placa}</div>
        <div style="font-size:13px;margin-top:6px">👤 ${mot?mot.nome:'Sem motorista'}</div>
        <div style="font-size:13px">💰 R$ ${total.toFixed(2).replace('.',',')} recebidos</div>
      </div>`;
    }).join('')}</div>`;
}

// ══════════════════════════════════════════════════════════════════════════════
// VEÍCULOS
// ══════════════════════════════════════════════════════════════════════════════
function renderVeiculos(){
  const {carros,motoristas}=state;
  $('page-veiculos').innerHTML=`
    <div class="page-header"><h2>Veículos</h2><button class="btn btn-primary" onclick="abrirModalCarro()">+ Novo Veículo</button></div>
    ${carros.length===0?'<p class="empty">Nenhum veículo cadastrado.</p>':''}
    ${carros.map(c=>{
      const mot=motoristas.find(m=>m.id===c.motorista_id);
      const opts=motoristas.map(m=>`<option value="${m.id}"${c.motorista_id===m.id?' selected':''}>${m.nome}</option>`).join('');
      return `<div class="card ${mot?'accent-green':'accent-yellow'}">
        <div class="card-row">
          <div style="flex:1">
            <div style="font-weight:700;font-size:15px">${c.modelo} <span style="color:#6b7280;font-weight:400">— ${c.placa}</span></div>
            <div style="font-size:13px;color:#6b7280">Ano: ${c.ano||'—'} | Cor: ${c.cor||'—'} | Chassi: ${c.chassi||'—'} | RENAVAM: ${c.renavam||'—'}</div>
            <div style="margin-top:8px;display:flex;align-items:center;gap:8px;flex-wrap:wrap">
              <span style="font-size:13px;font-weight:600">Motorista:</span>
              <select style="font-size:13px;padding:3px 8px;border:1px solid #d1d5db;border-radius:6px" onchange="vincularMotorista('${c.id}',this.value)">
                <option value="">— Sem motorista —</option>${opts}
              </select>
            </div>
            ${c.obs?`<div style="font-size:12px;color:#6b7280;margin-top:4px">📝 ${c.obs}</div>`:''}
          </div>
          <div class="row-actions">
            ${(c.docs&&c.docs.length>0)?`<button class="btn btn-ghost btn-sm" onclick='verDocs(${JSON.stringify(JSON.stringify(c.docs||[]))})'>📄 ${c.docs.length}</button>`:''}
            <button class="btn btn-danger btn-sm" onclick="delCarro('${c.id}')">✕</button>
          </div>
        </div>
      </div>`;
    }).join('')}`;
}

window.abrirModalCarro = () => {
  openModal('Novo Veículo',`
    <div class="field"><label>Modelo *</label><input id="f-modelo" placeholder="Ex: Hyundai HB20"/></div>
    <div class="field"><label>Placa *</label><input id="f-placa" placeholder="ABC1D23" oninput="this.value=this.value.toUpperCase()"/></div>
    <div class="grid2">
      <div class="field"><label>Ano</label><input id="f-ano" placeholder="2022"/></div>
      <div class="field"><label>Cor</label><input id="f-cor" placeholder="Prata"/></div>
    </div>
    <div class="field"><label>Chassi</label><input id="f-chassi"/></div>
    <div class="field"><label>RENAVAM</label><input id="f-renavam"/></div>
    <div class="field"><label>Vincular Motorista</label><select id="f-motorista"><option value="">— Nenhum —</option>${state.motoristas.map(m=>`<option value="${m.id}">${m.nome}</option>`).join('')}</select></div>
    <div class="field"><label>Documentos (imagem/PDF)</label><input type="file" id="f-docs" accept="image/*,application/pdf" multiple/><div id="f-docs-count" style="font-size:12px;color:#6b7280;margin-top:4px"></div></div>
    <div class="field"><label>Observações</label><input id="f-obs" placeholder="Observações gerais..."/></div>
  `, async ()=>{
    const modelo=$('f-modelo').value.trim(), placa=$('f-placa').value.trim();
    if(!modelo||!placa) return alert('Modelo e placa são obrigatórios.');
    const files=Array.from($('f-docs').files);
    const docs=await Promise.all(files.map(fileToBase64));
    await fbAdd('carros',{modelo,placa,ano:$('f-ano').value,cor:$('f-cor').value,chassi:$('f-chassi').value,renavam:$('f-renavam').value,motorista_id:$('f-motorista').value,obs:$('f-obs').value,docs});
    closeModal(); toast('Veículo adicionado! ✅');
  });
  $('f-docs').addEventListener('change',()=>{ $('f-docs-count').textContent=$('f-docs').files.length+' arquivo(s)'; });
};

window.vincularMotorista = async (carroId, motId) => { await fbUpd('carros',carroId,{motorista_id:motId}); toast('Vínculo atualizado!'); };
window.delCarro = async id => { if(confirm('Remover veículo?')){ await fbDel('carros',id); toast('Veículo removido.'); }};

// ══════════════════════════════════════════════════════════════════════════════
// MOTORISTAS
// ══════════════════════════════════════════════════════════════════════════════
function renderMotoristas(){
  const {motoristas,carros}=state;
  $('page-motoristas').innerHTML=`
    <div class="page-header"><h2>Motoristas</h2><button class="btn btn-primary" onclick="abrirModalMotorista()">+ Novo Motorista</button></div>
    ${motoristas.length===0?'<p class="empty">Nenhum motorista cadastrado.</p>':''}
    ${motoristas.map(m=>{
      const carro=carros.find(c=>c.motorista_id===m.id);
      const pts=Number(m.cnh_pontos||0);
      const ptsColor=pts>=35?'#ef4444':pts>=20?'#f59e0b':'#10b981';
      return `<div class="card">
        <div class="card-row">
          <div style="flex:1">
            <div style="font-weight:700;font-size:15px">${m.nome}</div>
            <div style="font-size:13px;color:#6b7280">CPF: ${m.cpf} | Tel: ${m.telefone||'—'}</div>
            <div style="font-size:13px;color:#6b7280">CNH: ${m.cnh||'—'} | Validade: ${fmt(m.cnh_validade)}</div>
            <div style="margin-top:6px;display:flex;gap:8px;flex-wrap:wrap;align-items:center">
              <span style="font-size:13px;font-weight:600;color:${ptsColor}">● ${pts} pontos</span>
              ${carro?`<span class="badge" style="background:#2563eb22;color:#2563eb">Carro: ${carro.placa}</span>`:`<span class="badge" style="background:#6b7280,22;color:#6b7280">Sem veículo</span>`}
            </div>
            ${m.obs?`<div style="font-size:12px;color:#6b7280;margin-top:4px">📝 ${m.obs}</div>`:''}
          </div>
          <div class="row-actions">
            ${(m.docs&&m.docs.length>0)?`<button class="btn btn-ghost btn-sm" onclick='verDocs(${JSON.stringify(JSON.stringify(m.docs||[]))})'>📄 ${m.docs.length}</button>`:''}
            <button class="btn btn-danger btn-sm" onclick="delMotorista('${m.id}')">✕</button>
          </div>
        </div>
      </div>`;
    }).join('')}`;
}

window.abrirModalMotorista = () => {
  openModal('Novo Motorista',`
    <div class="field"><label>Nome Completo *</label><input id="f-nome"/></div>
    <div class="grid2">
      <div class="field"><label>CPF *</label><input id="f-cpf" placeholder="000.000.000-00"/></div>
      <div class="field"><label>Telefone</label><input id="f-tel"/></div>
    </div>
    <div class="grid2">
      <div class="field"><label>Nº CNH</label><input id="f-cnh"/></div>
      <div class="field"><label>Validade CNH</label><input type="date" id="f-cnh-val"/></div>
    </div>
    <div class="field"><label>Pontos na CNH</label><input type="number" id="f-pontos" min="0" max="40" value="0"/></div>
    <div class="field"><label>Endereço</label><input id="f-end"/></div>
    <div class="field"><label>Documentos (CNH, RG, etc.)</label><input type="file" id="f-docs" accept="image/*,application/pdf" multiple/><div id="f-docs-count" style="font-size:12px;color:#6b7280;margin-top:4px"></div></div>
    <div class="field"><label>Observações</label><input id="f-obs"/></div>
  `, async ()=>{
    const nome=$('f-nome').value.trim(), cpf=$('f-cpf').value.trim();
    if(!nome||!cpf) return alert('Nome e CPF são obrigatórios.');
    const files=Array.from($('f-docs').files);
    const docs=await Promise.all(files.map(fileToBase64));
    await fbAdd('motoristas',{nome,cpf,telefone:$('f-tel').value,cnh:$('f-cnh').value,cnh_validade:$('f-cnh-val').value,cnh_pontos:$('f-pontos').value||'0',endereco:$('f-end').value,obs:$('f-obs').value,docs});
    closeModal(); toast('Motorista adicionado! ✅');
  });
  $('f-docs').addEventListener('change',()=>{ $('f-docs-count').textContent=$('f-docs').files.length+' arquivo(s)'; });
};

window.delMotorista = async id => { if(confirm('Remover motorista?')){ await fbDel('motoristas',id); toast('Motorista removido.'); }};

// ══════════════════════════════════════════════════════════════════════════════
// PAGAMENTOS
// ══════════════════════════════════════════════════════════════════════════════
function renderPagamentos(){
  const {pagamentos,carros}=state;
  const filtro = window._filtroCarroPag||'';
  const lista = filtro ? pagamentos.filter(p=>p.carro_id===filtro) : pagamentos;
  const total = lista.reduce((a,p)=>a+Number(p.valor||0),0);
  const opts=carros.map(c=>`<option value="${c.id}"${filtro===c.id?' selected':''}>${c.modelo} — ${c.placa}</option>`).join('');
  $('page-pagamentos').innerHTML=`
    <div class="page-header"><h2>Pagamentos</h2><button class="btn btn-primary" onclick="abrirModalPag()">+ Registrar</button></div>
    <div class="filter-bar">
      <select onchange="window._filtroCarroPag=this.value;renderPage()" style="padding:7px 12px;border:1px solid #d1d5db;border-radius:8px;font-size:14px">
        <option value="">Todos os veículos</option>${opts}
      </select>
      <div class="total-badge">Total: R$ ${total.toFixed(2).replace('.',',')}</div>
    </div>
    ${lista.length===0?'<p class="empty">Nenhum pagamento registrado.</p>':''}
    ${lista.map(p=>`<div class="card">
      <div class="card-row">
        <div>
          <span style="font-weight:700;font-size:16px;color:#10b981">R$ ${Number(p.valor).toFixed(2).replace('.',',')}</span>
          <span style="color:#6b7280;font-size:13px;margin-left:10px">${fmt(p.data)}</span>
          <div style="font-size:13px;margin-top:2px">${p.placa||'—'} · ${p.motorista||'—'} · ${p.forma||'—'}</div>
          ${p.descricao?`<div style="font-size:12px;color:#6b7280">${p.descricao}</div>`:''}
        </div>
        <button class="btn btn-danger btn-sm" onclick="delPag('${p.id}')">✕</button>
      </div>
    </div>`).join('')}`;
}

window.abrirModalPag = () => {
  const opts=state.carros.map(c=>`<option value="${c.id}">${c.modelo} — ${c.placa}</option>`).join('');
  openModal('Registrar Pagamento',`
    <div class="field"><label>Veículo *</label><select id="f-carro"><option value="">Selecione...</option>${opts}</select></div>
    <div class="grid2">
      <div class="field"><label>Valor (R$) *</label><input type="number" id="f-valor" min="0" step="0.01" placeholder="0,00"/></div>
      <div class="field"><label>Data</label><input type="date" id="f-data" value="${todayStr()}"/></div>
    </div>
    <div class="field"><label>Forma de Pagamento</label><select id="f-forma"><option>Pix</option><option>Dinheiro</option><option>Transferência</option><option>Outro</option></select></div>
    <div class="field"><label>Descrição</label><input id="f-desc" placeholder="Ex: Pagamento parcial semana 1"/></div>
  `, async ()=>{
    const carro_id=$('f-carro').value, valor=$('f-valor').value;
    if(!carro_id||!valor) return alert('Selecione o carro e informe o valor.');
    const c=state.carros.find(x=>x.id===carro_id);
    const m=state.motoristas.find(x=>x.id===c?.motorista_id);
    await fbAdd('pagamentos',{carro_id,valor:Number(valor),data:$('f-data').value,forma:$('f-forma').value,descricao:$('f-desc').value,placa:c?.placa||'',motorista:m?.nome||'—'});
    closeModal(); toast('Pagamento registrado! ✅');
  });
};

window.delPag = async id => { if(confirm('Remover pagamento?')){ await fbDel('pagamentos',id); toast('Removido.'); }};

// ══════════════════════════════════════════════════════════════════════════════
// MANUTENÇÕES
// ══════════════════════════════════════════════════════════════════════════════
function renderManutencoes(){
  const {manutencoes}=state;
  $('page-manutencoes').innerHTML=`
    <div class="page-header"><h2>Manutenções</h2><button class="btn btn-primary" onclick="abrirModalMan()">+ Nova</button></div>
    ${manutencoes.length===0?'<p class="empty">Nenhuma manutenção registrada.</p>':''}
    ${manutencoes.map(m=>`<div class="card ${m.ok?'accent-green':'accent-yellow'}">
      <div class="card-row">
        <div style="flex:1">
          <div style="font-weight:700">${m.tipo} <span class="badge" style="background:${m.ok?'#10b98122':'#f59e0b22'};color:${m.ok?'#10b981':'#f59e0b'}">${m.ok?'Concluído':'Pendente'}</span></div>
          <div style="font-size:13px;color:#6b7280">${m.modelo||''} — ${m.placa||''} | ${fmt(m.data)}</div>
          <div style="font-size:13px">${m.km?'KM: '+m.km+' ':''} ${m.custo?'| Custo: R$ '+Number(m.custo).toFixed(2).replace('.',',')+' ':''} ${m.proxima_km?'| Próxima: '+m.proxima_km+' km':''}</div>
          ${m.obs?`<div style="font-size:12px;color:#6b7280">${m.obs}</div>`:''}
        </div>
        <div class="row-actions">
          <button class="btn btn-ghost btn-sm" onclick="toggleMan('${m.id}',${!m.ok})">${m.ok?'Reabrir':'✓ Concluir'}</button>
          <button class="btn btn-danger btn-sm" onclick="delMan('${m.id}')">✕</button>
        </div>
      </div>
    </div>`).join('')}`;
}

window.abrirModalMan = () => {
  const tipos=['Troca de óleo','Revisão geral','Pneus','Freios','Suspensão','Elétrica','Funilaria','Ar-condicionado','Outro'];
  const opts=state.carros.map(c=>`<option value="${c.id}">${c.modelo} — ${c.placa}</option>`).join('');
  openModal('Nova Manutenção',`
    <div class="field"><label>Veículo *</label><select id="f-carro"><option value="">Selecione...</option>${opts}</select></div>
    <div class="field"><label>Tipo</label><select id="f-tipo">${tipos.map(t=>`<option>${t}</option>`).join('')}</select></div>
    <div class="grid2">
      <div class="field"><label>Data</label><input type="date" id="f-data" value="${todayStr()}"/></div>
      <div class="field"><label>KM atual</label><input type="number" id="f-km"/></div>
    </div>
    <div class="grid2">
      <div class="field"><label>Custo (R$)</label><input type="number" step="0.01" id="f-custo"/></div>
      <div class="field"><label>Próxima (KM)</label><input type="number" id="f-proxkm"/></div>
    </div>
    <div class="field"><label>Observações</label><input id="f-obs"/></div>
  `, async ()=>{
    const carro_id=$('f-carro').value;
    if(!carro_id) return alert('Selecione o veículo.');
    const c=state.carros.find(x=>x.id===carro_id);
    await fbAdd('manutencoes',{carro_id,tipo:$('f-tipo').value,data:$('f-data').value,km:$('f-km').value,custo:$('f-custo').value,proxima_km:$('f-proxkm').value,obs:$('f-obs').value,ok:false,placa:c?.placa||'',modelo:c?.modelo||''});
    closeModal(); toast('Manutenção registrada! ✅');
  });
};

window.toggleMan = async (id,val) => { await fbUpd('manutencoes',id,{ok:val}); toast(val?'Concluída! ✅':'Reaberta.'); };
window.delMan = async id => { if(confirm('Remover?')){ await fbDel('manutencoes',id); toast('Removido.'); }};

// ══════════════════════════════════════════════════════════════════════════════
// MULTAS
// ══════════════════════════════════════════════════════════════════════════════
function renderMultas(){
  const {multas}=state;
  $('page-multas').innerHTML=`
    <div class="page-header"><h2>Multas</h2><button class="btn btn-primary" onclick="abrirModalMulta()">+ Registrar</button></div>
    ${multas.length===0?'<p class="empty">Nenhuma multa registrada.</p>':''}
    ${multas.map(m=>`<div class="card ${m.pago?'accent-green':'accent-red'}">
      <div class="card-row">
        <div style="flex:1">
          <div style="font-weight:700">${m.descricao} <span class="badge" style="background:${m.pago?'#10b98122':'#ef444422'};color:${m.pago?'#10b981':'#ef4444'}">${m.pago?'Paga':'Pendente'}</span></div>
          <div style="font-size:13px;color:#6b7280">${m.placa||'—'} | ${fmt(m.data)} ${m.vencimento?'| Vence: '+fmt(m.vencimento):''}</div>
          <div style="font-size:13px">${m.valor?'R$ '+Number(m.valor).toFixed(2).replace('.',',')+' ':''} ${m.pontos?`<span style="color:#ef4444;font-weight:600">| ${m.pontos} pts </span>`:''} <span style="color:#6b7280">| ${m.resp==='motorista'?'Motorista paga':'Proprietário paga'}</span></div>
          ${m.motorista&&m.motorista!=='—'?`<div style="font-size:12px;color:#6b7280">Motorista: ${m.motorista}</div>`:''}
        </div>
        <div class="row-actions">
          <button class="btn btn-ghost btn-sm" onclick="toggleMulta('${m.id}',${!m.pago})">${m.pago?'Reabrir':'✓ Paga'}</button>
          <button class="btn btn-danger btn-sm" onclick="delMulta('${m.id}')">✕</button>
        </div>
      </div>
    </div>`).join('')}`;
}

window.abrirModalMulta = () => {
  const optsC=state.carros.map(c=>`<option value="${c.id}">${c.modelo} — ${c.placa}</option>`).join('');
  const optsM=state.motoristas.map(m=>`<option value="${m.id}">${m.nome}</option>`).join('');
  openModal('Registrar Multa',`
    <div class="field"><label>Veículo *</label><select id="f-carro"><option value="">Selecione...</option>${optsC}</select></div>
    <div class="field"><label>Motorista</label><select id="f-mot"><option value="">— Nenhum —</option>${optsM}</select></div>
    <div class="field"><label>Descrição da Infração *</label><input id="f-desc" placeholder="Ex: Excesso de velocidade"/></div>
    <div class="grid2">
      <div class="field"><label>Data</label><input type="date" id="f-data" value="${todayStr()}"/></div>
      <div class="field"><label>Vencimento</label><input type="date" id="f-venc"/></div>
    </div>
    <div class="grid2">
      <div class="field"><label>Valor (R$)</label><input type="number" step="0.01" id="f-valor"/></div>
      <div class="field"><label>Pontos CNH</label><input type="number" min="0" max="7" id="f-pontos"/></div>
    </div>
    <div class="field"><label>Quem paga?</label><select id="f-resp"><option value="motorista">Motorista</option><option value="proprietario">Proprietário</option></select></div>
  `, async ()=>{
    const carro_id=$('f-carro').value, desc=$('f-desc').value.trim();
    if(!carro_id||!desc) return alert('Selecione o carro e descreva a infração.');
    const c=state.carros.find(x=>x.id===carro_id);
    const m=state.motoristas.find(x=>x.id===$('f-mot').value);
    await fbAdd('multas',{carro_id,motorista_id:$('f-mot').value,descricao:desc,data:$('f-data').value,vencimento:$('f-venc').value,valor:$('f-valor').value,pontos:$('f-pontos').value,resp:$('f-resp').value,pago:false,placa:c?.placa||'',motorista:m?.nome||'—'});
    closeModal(); toast('Multa registrada! ✅');
  });
};

window.toggleMulta = async (id,val) => { await fbUpd('multas',id,{pago:val}); toast(val?'Marcada como paga! ✅':'Reaberta.'); };
window.delMulta = async id => { if(confirm('Remover?')){ await fbDel('multas',id); toast('Removido.'); }};

</script>
