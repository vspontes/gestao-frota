<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MGP Locadora</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f3f4f6;min-height:100vh}
.hidden{display:none!important}
input,select,textarea{width:100%;padding:9px 12px;border:1.5px solid #e5e7eb;border-radius:10px;font-size:14px;font-family:inherit;background:#fff;transition:border .2s}
input:focus,select:focus{outline:none;border-color:#2563eb}
.field{margin-bottom:12px}
label{display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:4px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.btn{cursor:pointer;border:none;border-radius:10px;font-weight:600;display:inline-flex;align-items:center;gap:6px;font-family:inherit;font-size:14px;padding:9px 18px;transition:opacity .15s}
.btn:hover{opacity:.85}
.btn-primary{background:linear-gradient(135deg,#1e3a5f,#2563eb);color:#fff}
.btn-danger{background:#ef4444;color:#fff}
.btn-ghost{background:transparent;color:#2563eb;border:1.5px solid #2563eb}
.btn-green{background:#10b981;color:#fff}
.btn-yellow{background:#f59e0b;color:#fff}
.btn-gray{background:#6b7280;color:#fff}
.btn-sm{padding:5px 12px;font-size:13px}
.btn-block{width:100%;justify-content:center}
.card{background:#fff;border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.card.accent-green{border-left:4px solid #10b981}
.card.accent-yellow{border-left:4px solid #f59e0b}
.card.accent-red{border-left:4px solid #ef4444}
.card.accent-blue{border-left:4px solid #2563eb}
.card.accent-purple{border-left:4px solid #8b5cf6}
.badge{border-radius:20px;padding:3px 10px;font-size:12px;font-weight:600}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:12px}
.modal-box{background:#fff;border-radius:14px;padding:24px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.modal-header h3{font-size:17px;color:#1e3a5f;font-weight:700}
.modal-close{background:none;border:none;font-size:24px;cursor:pointer;color:#6b7280}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:12px}
.page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.page-header h2{color:#1e3a5f;font-size:20px;font-weight:700}
.empty{color:#9ca3af;font-size:14px;padding:20px 0;text-align:center}
.card-row{display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px}
.row-actions{display:flex;gap:6px;align-items:flex-start;flex-shrink:0}
.toast{position:fixed;bottom:20px;right:20px;background:#1e3a5f;color:#fff;padding:12px 20px;border-radius:10px;font-size:14px;z-index:999;opacity:0;transition:opacity .3s;max-width:300px}
.toast.show{opacity:1}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:12px;margin-bottom:20px}
.stat-card{background:#fff;border-radius:12px;padding:14px;display:flex;align-items:center;gap:12px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.fleet-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.filter-bar{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.total-badge{background:#eff6ff;border-radius:8px;padding:7px 16px;font-weight:700;color:#2563eb}
.doc-item{margin-bottom:12px;border:1px solid #e5e7eb;border-radius:8px;padding:10px}
.doc-item img{max-width:100%;border-radius:6px;margin-top:6px}
.progress-bar{background:#e5e7eb;border-radius:10px;height:10px;overflow:hidden}
.progress-fill{height:100%;border-radius:10px;transition:width .5s}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-bottom:16px}
.kpi{background:#fff;border-radius:12px;padding:12px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.kpi .val{font-size:17px;font-weight:800;margin-bottom:2px}
.kpi .lbl{font-size:11px;color:#6b7280}
.alert-box{border-radius:10px;padding:12px 14px;margin-bottom:10px;font-size:13px;font-weight:600;display:flex;align-items:flex-start;gap:8px}
.alert-red{background:#fef2f2;color:#ef4444;border:1px solid #fecaca}
.alert-yellow{background:#fffbeb;color:#d97706;border:1px solid #fde68a}
.alert-green{background:#f0fdf4;color:#10b981;border:1px solid #bbf7d0}
.alert-blue{background:#eff6ff;color:#2563eb;border:1px solid #bfdbfe}
#sidebar{width:220px;background:#1e3a5f;flex-shrink:0;display:flex;flex-direction:column;min-height:100vh;position:fixed;top:0;left:0;z-index:50}
#main{margin-left:220px;flex:1;padding:24px;min-height:100vh}
.nav-btn{width:100%;background:transparent;color:#93c5fd;border:none;border-radius:8px;padding:10px 14px;cursor:pointer;display:flex;align-items:center;gap:10px;font-size:13px;font-weight:400;margin-bottom:2px;text-align:left;transition:background .15s}
.nav-btn.active{background:#2563eb;color:#fff;font-weight:700}
.sidebar-logo{padding:20px 16px 14px;border-bottom:1px solid #2d4f7c;text-align:center}
.sidebar-footer{padding:10px 8px;border-top:1px solid #2d4f7c}
#topbar{display:none;position:fixed;top:0;left:0;right:0;height:56px;background:#1e3a5f;z-index:50;align-items:center;padding:0 16px;gap:12px}
#topbar-title{color:#fff;font-weight:700;font-size:15px;flex:1}
#hamburger{display:flex;flex-direction:column;gap:5px;cursor:pointer;padding:6px}
#hamburger span{width:22px;height:2px;background:#fff;border-radius:2px;display:block}
#mobile-menu{position:fixed;top:56px;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:49;display:none}
#mobile-menu.open{display:block}
#mobile-menu-inner{background:#1e3a5f;width:240px;height:100%;padding:12px 8px;overflow-y:auto}
.mobile-nav-btn{width:100%;background:transparent;color:#93c5fd;border:none;border-radius:8px;padding:12px 14px;cursor:pointer;display:flex;align-items:center;gap:10px;font-size:14px;margin-bottom:4px;text-align:left}
.mobile-nav-btn.active{background:#2563eb;color:#fff;font-weight:700}
@media(max-width:768px){
  #sidebar{display:none!important}
  #topbar{display:flex!important}
  #main{margin-left:0!important;margin-top:56px;padding:14px}
}
#motorista-app{min-height:100vh;background:#f3f4f6}
.mot-header{background:linear-gradient(135deg,#1e3a5f,#2563eb);padding:20px 16px;color:#fff}
.mot-card{background:#fff;border-radius:14px;padding:16px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.mot-stat{background:linear-gradient(135deg,#1e3a5f,#2563eb);border-radius:14px;padding:16px;color:#fff;margin-bottom:12px}
.tab-bar{display:flex;gap:6px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tab-bar::-webkit-scrollbar{display:none}
.tab-btn{flex-shrink:0;padding:8px 14px;border-radius:20px;border:none;cursor:pointer;font-size:13px;font-weight:600;background:#fff;color:#374151;box-shadow:0 1px 3px rgba(0,0,0,.1);transition:all .2s}
.tab-btn.active{background:#2563eb;color:#fff}
.cronometro-btn{border:none;border-radius:12px;padding:12px 22px;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s}
.plataforma-item{border:1.5px solid #e5e7eb;border-radius:10px;padding:12px;margin-bottom:8px;background:#fafafa}
</style>
</head>
<body>

          <path d="M300,40 L300,160 L325,160 L325,115 L355,115 C378,115 395,99 395,77 C395,55 378,40 355,40 Z M325,62 L352,62 C363,62 370,68 370,77 C370,87 363,93 352,93 L325,93 Z" fill="#1e3a5f"/>
          <text x="200" y="210" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="26" font-weight="900" fill="#1e3a5f" letter-spacing="3">LOCADORA</text>
          <text x="200" y="248" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="26" font-weight="900" fill="#1e3a5f" letter-spacing="3">DE VEÍCULOS</text>

      <p style="color:#9ca3af;font-size:11px;text-align:center;margin-top:16px">© 2025 MGP Locadora de Veículos</p>
    </div>

</div>

<!-- APP ADMIN -->

<div id="app" class="hidden" style="display:flex;min-height:100vh">
  <div id="sidebar">
    <div class="sidebar-logo">
      <svg viewBox="0 0 400 300" width="50" height="38" xmlns="http://www.w3.org/2000/svg">
        <path d="M20,40 L20,160 L50,160 L50,90 L80,160 L110,90 L110,160 L140,160 L140,40 L110,40 L80,110 L50,40 Z" fill="#fff"/>
        <path d="M160,100 C160,60 190,35 225,35 C255,35 278,52 285,72 L260,82 C255,68 243,58 225,58 C203,58 185,76 185,100 C185,124 203,142 225,142 C243,142 256,132 261,118 L235,118 L235,97 L285,97 L285,160 L265,160 L265,146 C255,156 242,162 225,162 C190,162 160,140 160,100 Z" fill="#fff"/>
        <path d="M300,40 L300,160 L325,160 L325,115 L355,115 C378,115 395,99 395,77 C395,55 378,40 355,40 Z M325,62 L352,62 C363,62 370,68 370,77 C370,87 363,93 352,93 L325,93 Z" fill="#fff"/>

      <path d="M300,40 L300,160 L325,160 L325,115 L355,115 C378,115 395,99 395,77 C395,55 378,40 355,40 Z M325,62 L352,62 C363,62 370,68 370,77 C370,87 363,93 352,93 L325,93 Z" fill="#fff"/>

<!-- APP MOTORISTA -->

<div id="motorista-app" class="hidden">
  <div class="mot-header">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <svg viewBox="0 0 400 300" width="55" height="41" xmlns="http://www.w3.org/2000/svg">
        <path d="M20,40 L20,160 L50,160 L50,90 L80,160 L110,90 L110,160 L140,160 L140,40 L110,40 L80,110 L50,40 Z" fill="#fff"/>
        <path d="M160,100 C160,60 190,35 225,35 C255,35 278,52 285,72 L260,82 C255,68 243,58 225,58 C203,58 185,76 185,100 C185,124 203,142 225,142 C243,142 256,132 261,118 L235,118 L235,97 L285,97 L285,160 L265,160 L265,146 C255,156 242,162 225,162 C190,162 160,140 160,100 Z" fill="#fff"/>
        <path d="M300,40 L300,160 L325,160 L325,115 L355,115 C378,115 395,99 395,77 C395,55 378,40 355,40 Z M325,62 L352,62 C363,62 370,68 370,77 C370,87 363,93 352,93 L325,93 Z" fill="#fff"/>
      </svg>
      <button onclick="doLogout()" style="background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:8px;padding:8px 14px;cursor:pointer;font-size:13px">🚪 Sair</button>

    </div>

<div id="toast" class="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCiyTqzSeCPG_SPaSqe7RFDbuYGO15RAj8",
  authDomain: "frota-carros-67e9e.firebaseapp.com",
  projectId: "frota-carros-67e9e",
  storageBucket: "frota-carros-67e9e.firebasestorage.app",
  messagingSenderId: "708276056895",
  appId: "1:708276056895:web:890c4f40df6b8d961d198a"
};

const fb = initializeApp(firebaseConfig);
const db = getFirestore(fb);

let state={carros:[],motoristas:[],pagamentos:[],manutencoes:[],multas:[],usuarios:[],jornadas:[],abastecimentos:[]};
let currentPage='dashboard', currentUser=null, motAba='hoje', jornadaTimer=null;

const fmt=d=>d?new Date(d+'T12:00:00').toLocaleDateString('pt-BR'):'—';
const fmtR=v=>'R$ '+Number(v||0).toFixed(2).replace('.',',');
const todayStr=()=>new Date().toISOString().split('T')[0];
const $=id=>document.getElementById(id);
const toast=msg=>{const t=$('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);};
const fileToBase64=f=>new Promise(r=>{const fr=new FileReader();fr.onload=e=>r({name:f.name,type:f.type,data:e.target.result});fr.readAsDataURL(f);});
const fbAdd=async(col,data)=>{const r=await addDoc(collection(db,col),{...data,criadoEm:new Date().toISOString()});return r.id;};
const fbDel=async(col,id)=>deleteDoc(doc(db,col,id));
const fbUpd=async(col,id,data)=>updateDoc(doc(db,col,id),data);
const fbListen=(col,cb)=>onSnapshot(collection(db,col),snap=>{const d=[];snap.forEach(x=>d.push({id:x.id,...x.data()}));cb(d);});

async function inicializarUsuarios(){
  const snap=await getDocs(collection(db,'usuarios'));
  if(snap.empty) await fbAdd('usuarios',{nome:'Administrador',login:'admin',telefone:'',senha:'mgp123',perfil:'admin',ativo:true});
}

// ── AUTH ──────────────────────────────────────────────────────────────────
window.doLogin=async()=>{
  const u=$('login-user').value.trim().toLowerCase(),s=$('login-pass').value;
  if(!u||!s){$('login-err').style.display='block';$('login-err').textContent='⚠️ Preencha todos os campos.';return;}
  const snap=await getDocs(collection(db,'usuarios'));
  let found=null;
  snap.forEach(d=>{const x={id:d.id,...d.data()};if((x.login?.toLowerCase()===u||x.telefone===u)&&x.senha===s&&x.ativo!==false)found=x;});
  if(!found){$('login-err').style.display='block';$('login-err').textContent='⚠️ Usuário ou senha incorretos.';return;}
  currentUser=found;$('login-err').style.display='none';
  $('login-screen').classList.add('hidden');
  if(found.perfil==='motorista') iniciarMotorista(found);
  else iniciarAdmin(found);
};

window.doLogout=()=>{
  currentUser=null;if(jornadaTimer)clearInterval(jornadaTimer);
  ['app','motorista-app'].forEach(id=>$(id).classList.add('hidden'));
  $('login-screen').classList.remove('hidden');
  $('login-user').value='';$('login-pass').value='';
};

window.mostrarEsqueceuSenha=()=>{
  openModal('Esqueceu a senha?',`<p style="font-size:14px;color:#6b7280;margin-bottom:16px">Sua senha será redefinida para <b>mgp123</b>.</p><div class="field"><label>Usuário ou Telefone</label><input id="f-ru"/></div>`,async()=>{
    const u=$('f-ru').value.trim().toLowerCase();
    const snap=await getDocs(collection(db,'usuarios'));let found=null;
    snap.forEach(d=>{const x={id:d.id,...d.data()};if(x.login?.toLowerCase()===u||x.telefone===u)found=x;});
    if(!found)return alert('Usuário não encontrado.');
    await fbUpd('usuarios',found.id,{senha:'mgp123'});closeModal();toast('Senha redefinida para mgp123! ✅');
  });
};

// ── ADMIN ─────────────────────────────────────────────────────────────────
function iniciarAdmin(user){
  $('app').classList.remove('hidden');
  $('sidebar-user-name').textContent=user.perfil==='admin'?'👑 Admin':'⚙️ Funcionário';
  buildMenu(user.perfil);initListeners();goTo('dashboard');
}

function buildMenu(perfil){
  const pages=[
    {id:'dashboard',e:'📊',l:'Dashboard'},{id:'veiculos',e:'🚗',l:'Veículos'},
    {id:'motoristas',e:'👤',l:'Motoristas'},{id:'pagamentos',e:'💰',l:'Pagamentos'},
    {id:'manutencoes',e:'🔧',l:'Manutenções'},{id:'multas',e:'🚨',l:'Multas'},
    {id:'frota',e:'📈',l:'Inteligência'},
    ...(perfil==='admin'?[{id:'usuarios',e:'👥',l:'Usuários'}]:[]),
    {id:'minhaconta',e:'🔑',l:'Minha Conta'},
  ];
  const nav=$('sidebar-nav'),mn=$('mobile-nav');nav.innerHTML='';mn.innerHTML='';
  pages.forEach(p=>{
    nav.innerHTML+=`<button class="nav-btn" onclick="goTo('${p.id}')" id="nav-${p.id}">${p.e} ${p.l}</button>`;
    mn.innerHTML+=`<button class="mobile-nav-btn" id="mnav-${p.id}" onclick="goTo('${p.id}');toggleMenu()">${p.e} ${p.l}</button>`;
  });
}

function initListeners(){
  ['carros','motoristas','pagamentos','manutencoes','multas','usuarios','jornadas','abastecimentos'].forEach(col=>{
    fbListen(col,d=>{state[col]=d;renderPage();});
  });
}

window.toggleMenu=()=>$('mobile-menu').classList.toggle('open');
window.goTo=page=>{
  currentPage=page;
  document.querySelectorAll('.nav-btn,.mobile-nav-btn').forEach(b=>b.classList.remove('active'));
  $('nav-'+page)?.classList.add('active');$('mnav-'+page)?.classList.add('active');
  ['dashboard','veiculos','motoristas','pagamentos','manutencoes','multas','frota','usuarios','minhaconta'].forEach(p=>{
    $('page-'+p)?.classList.toggle('hidden',p!==page);
  });
  renderPage();
};

function renderPage(){
  if(!currentUser||currentUser.perfil==='motorista')return;
  const pages={dashboard:renderDashboard,veiculos:renderVeiculos,motoristas:renderMotoristas,
    pagamentos:renderPagamentos,manutencoes:renderManutencoes,multas:renderMultas,

window.openModal=(title,body,onSave)=>{
  $('modal-overlay')?.remove();
  const d=document.createElement('div');d.id='modal-overlay';d.className='modal-overlay';
  d.innerHTML=`<div class="modal-box"><div class="modal-header"><h3>${title}</h3><button class="modal-close" onclick="closeModal()">×</button></div><div id="modal-body">${body}</div><div class="modal-footer"><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" id="msb">Salvar</button></div></div>`;
  document.body.appendChild(d);$('msb').onclick=onSave;
};
window.closeModal=()=>$('modal-overlay')?.remove();
window.verDocs=docsJSON=>{
  const docs=JSON.parse(docsJSON);
  const d=document.createElement('div');d.id='modal-overlay';d.className='modal-overlay';
  d.innerHTML=`<div class="modal-box"><div class="modal-header"><h3>Documentos</h3><button class="modal-close" onclick="closeModal()">×</button></div>${docs.length===0?'<p class="empty">Sem documentos.</p>':docs.map(x=>`<div class="doc-item"><b style="font-size:13px">${x.name}</b>${x.type.startsWith('image/')?`<img src="${x.data}"/>`:`<br><a href="${x.data}" download="${x.name}" style="color:#2563eb;font-size:13px">⬇ Baixar</a>`}</div>`).join('')}</div>`;
  document.body.appendChild(d);
};

function renderDashboard(){
  const {carros,motoristas,pagamentos,manutencoes,multas}=state;
  const totalRec=pagamentos.reduce((a,p)=>a+Number(p.valor||0),0);
  const semMot=carros.filter(c=>!c.motorista_id).length;
  const multPend=multas.filter(m=>!m.pago).length;
  const manPend=manutencoes.filter(m=>!m.ok).length;
  const stats=[
    {l:'Veículos',v:carros.length,e:'🚗',c:'#2563eb'},{l:'Com Motorista',v:carros.length-semMot,e:'✅',c:'#10b981'},
    {l:'Sem Motorista',v:semMot,e:'⚠️',c:'#f59e0b'},{l:'Total Recebido',v:fmtR(totalRec),e:'💰',c:'#8b5cf6'},
    {l:'Manutenções Pend.',v:manPend,e:'🔧',c:'#06b6d4'},{l:'Multas Pendentes',v:multPend,e:'🚨',c:'#ef4444'},
  ];
  $('page-dashboard').innerHTML=`
    <h2 style="color:#1e3a5f;margin-bottom:16px">Dashboard</h2>
    <div class="stats-grid">${stats.map(s=>`<div class="stat-card"><span style="font-size:26px">${s.e}</span><div><div style="font-size:19px;font-weight:700;color:${s.c}">${s.v}</div><div style="font-size:11px;color:#6b7280">${s.l}</div></div></div>`).join('')}</div>
    <h3 style="color:#1e3a5f;margin-bottom:12px">Frota</h3>
    ${carros.length===0?'<p class="empty">Nenhum veículo cadastrado.</p>':''}
    <div class="fleet-grid">${carros.map(c=>{
      const mot=motoristas.find(m=>m.id===c.motorista_id);
      const total=pagamentos.filter(p=>p.carro_id===c.id).reduce((a,p)=>a+Number(p.valor||0),0);
      return `<div class="card ${mot?'accent-green':'accent-yellow'}">
        <div style="font-weight:700">${c.modelo}</div><div style="font-size:13px;color:#6b7280">${c.placa}</div>
        <div style="font-size:13px;margin-top:6px">👤 ${mot?mot.nome:'Sem motorista'}</div>
        <div style="font-size:13px">💰 ${fmtR(total)} recebidos</div>

    }).join('')}</div>`;
}

function calcScore(mot){
  const {jornadas,multas,carros}=state;
  const jMot=jornadas.filter(j=>j.motorista_id===mot.id);
  const carro=carros.find(c=>c.motorista_id===mot.id);
  const multasMot=multas.filter(m=>m.carro_id===carro?.id&&!m.pago).length;
  const bruto=jMot.reduce((a,j)=>a+Number(j.bruto||0),0);
  const horas=jMot.reduce((a,j)=>a+Number(j.horas||0),0);
  const km=jMot.reduce((a,j)=>a+Number(j.km||0),0);
  const gastos=jMot.reduce((a,j)=>a+(j.gastos||[]).reduce((b,g)=>b+Number(g.valor||0),0),0);
  const lucro=bruto-gastos;
  const lHora=horas>0?(lucro/horas):0;
  const lKm=km>0?(lucro/km):0;
  const score=Math.round(Math.min(100,(lHora/20)*100)*0.35+Math.min(100,(lKm/0.5)*100)*0.35+Math.max(0,100-multasMot*20)*0.30);
  return {score,lHora,lKm,lucro,horas,km,multasMot};
}

  return `

      return `<div class="card"><div style="display:flex;align-items:center;gap:14px">

}

function getJornada(user,data){
  return (state.jornadas||[]).find(j=>j.data===data&&j.motorista_id===user.motorista_id)||{gastos:[],receitas:[],bruto:0,km:0,horas:0,horas_segundos:0,corridas:0};
}

function calcJornada(j,carro){
  const bruto=Number(j.bruto||0);
  const gastos=(j.gastos||[]).reduce((a,g)=>a+Number(g.valor||0),0);
  const horas=Number(j.horas||0);
  const km=Number(j.km||0);
  const corridas=Number(j.corridas||0);
  const compra=Number(carro?.valor_compra||0),revenda=Number(carro?.valor_revenda||0),vidaUtil=Number(carro?.vida_util_km||200000);
  const custDepKm=vidaUtil>0?((compra-revenda)/vidaUtil):0;
  const custDep=custDepKm*km;
  const liquido=bruto-gastos;
  const lucroReal=liquido-custDep;
  const lucroHora=horas>0?(lucroReal/horas):0;
  const lucroKm=km>0?(lucroReal/km):0;
  const ganhoKm=km>0?(bruto/km):0;
  const custoKm=km>0?((gastos+custDep)/km):0;
  const mediaCorreida=corridas>0?(bruto/corridas):0;
  return {bruto,gastos,horas,km,corridas,liquido,custDep,custDepKm,lucroReal,lucroHora,lucroKm,ganhoKm,custoKm,mediaCorreida};
}

function renderMotHoje(user,mot,carro){
  const hoje=todayStr();

  const d=calcJornada(j,carro);
  const aluguelDia=Number(cfg.aluguel_semanal||0)/6;
  const lucroFinal=d.lucroReal-aluguelDia;
  const metaDia=Number(cfg.meta_diaria||0);
  const progMeta=metaDia>0?Math.min(100,(d.bruto/metaDia)*100):0;
  const faltaMeta=metaDia>0?Math.max(0,metaDia-d.bruto):0;
  const horasFalta=d.horas>0&&d.bruto>0?(faltaMeta/(d.bruto/d.horas)):0;
  const previsao=d.horas>0?(d.bruto/d.horas)*8:0;

  // Alertas
  const alertas=[];
  if(d.lucroReal<0&&d.bruto>0) alertas.push({t:'red',m:'🚨 Atenção! Você está operando no prejuízo hoje.'});
  if(d.ganhoKm>0&&d.custoKm>0&&d.ganhoKm<d.custoKm) alertas.push({t:'red',m:`⚠️ Ganho/km (${fmtR(d.ganhoKm)}) abaixo do custo/km (${fmtR(d.custoKm)}). Reveja seus gastos!`});
  if(metaDia>0&&d.bruto>=metaDia) alertas.push({t:'green',m:'🎉 Parabéns! Você bateu a meta do dia!'});
  else if(metaDia>0&&d.horas>4&&d.bruto<metaDia*0.5) alertas.push({t:'yellow',m:`📉 Você está em ${((d.bruto/metaDia)*100).toFixed(0)}% da meta. ${horasFalta>0?'Estimativa: mais '+horasFalta.toFixed(1)+'h para bater.':''}`});
  if(d.lucroHora>0&&d.lucroHora<15&&d.horas>2) alertas.push({t:'yellow',m:`⏱️ Lucro/hora de ${fmtR(d.lucroHora)}/h está baixo. Avalie se vale continuar.`});
  if(d.mediaCorreida>0) alertas.push({t:'blue',m:`🎯 Média por corrida hoje: ${fmtR(d.mediaCorreida)}. ${d.mediaCorreida<15?'Tente focar em corridas mais longas.':'Bom trabalho!'}`});

  // Comparativo 7 dias
  const ultimos7=(state.jornadas||[]).filter(j=>j.motorista_id===user.motorista_id).slice(-7);

function renderUltimoAbast(user){
  const abast=(state.abastecimentos||[]).filter(a=>a.motorista_id===user.motorista_id).sort((a,b)=>new Date(b.data)-new Date(a.data));
  if(abast.length===0) return '<p style="font-size:12px;color:#9ca3af;text-align:center">Nenhum abastecimento registrado</p>';
  const ult=abast[0];
  const consumo=abast.length>=2?((ult.km_atual||0)-(abast[1].km_atual||0))/(ult.litros||1):0;
  const custKm=consumo>0?((ult.valor||0)/(ult.litros||1))/consumo:0;
  return `<div style="font-size:13px">
    <div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="color:#6b7280">Último: ${fmt(ult.data)}</span><span style="font-weight:600;color:#f59e0b">${fmtR(ult.valor)}</span></div>
    <div style="display:flex;gap:16px;font-size:12px;color:#6b7280">
      <span>${ult.litros}L</span>
      <span>KM:${ult.km_atual||'—'}</span>
      ${consumo>0?`<span style="color:#10b981;font-weight:600">${consumo.toFixed(1)} km/l</span>`:''}
      ${custKm>0?`<span style="color:#ef4444;font-weight:600">R$ ${custKm.toFixed(3).replace('.',',')}/km</span>`:''}
    </div>
  </div>`;
}

// ─── ABA SEMANA ───────────────────────────────────────────────────────────
function renderMotSemana(user,carro,mot){
  const agora=new Date();
  const ini=new Date(agora);ini.setDate(agora.getDate()-agora.getDay());
  const fim=new Date(ini);fim.setDate(ini.getDate()+6);
  const jSem=(state.jornadas||[]).filter(j=>{const d=new Date(j.data+'T12:00:00');return d>=ini&&d<=fim&&j.motorista_id===user.motorista_id;});
  const tot=jSem.reduce((a,j)=>{const d=calcJornada(j,carro);return{bruto:a.bruto+d.bruto,gastos:a.gastos+d.gastos,km:a.km+d.km,horas:a.horas+d.horas,lucroReal:a.lucroReal+d.lucroReal,corridas:a.corridas+(Number(j.corridas||0))};},{bruto:0,gastos:0,km:0,horas:0,lucroReal:0,corridas:0});
  const cfg=mot.config||{};
  const alugSem=Number(cfg.aluguel_semanal||0);
  const lucroFinal=tot.lucroReal-alugSem;
  const metaSem=Number(cfg.meta_semanal||0);
  const prog=metaSem>0?Math.min(100,(tot.bruto/metaSem)*100):0;
  const lHora=tot.horas>0?(tot.lucroReal/tot.horas):0;
  const lKm=tot.km>0?(tot.lucroReal/tot.km):0;
  const mediaCorr=tot.corridas>0?(tot.bruto/tot.corridas):0;
  return `
  ${metaSem>0?`<div class="mot-card">
    <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px"><span style="font-weight:600">🎯 Meta Semanal: ${fmtR(metaSem)}</span><span style="font-weight:700;color:${prog>=100?'#10b981':'#2563eb'}">${prog.toFixed(0)}%</span></div>
    <div class="progress-bar"><div class="progress-fill" style="width:${prog}%;background:${prog>=100?'#10b981':'#2563eb'}"></div></div>
    <div style="font-size:12px;color:#6b7280;margin-top:4px">${prog<100?'Falta '+fmtR(Math.max(0,metaSem-tot.bruto)):'🎉 Meta atingida!'}</div>
  </div>`:''}
  <div class="mot-stat">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div style="text-align:center"><div style="font-size:11px;opacity:.8">Sem aluguel</div><div style="font-size:22px;font-weight:800">${fmtR(tot.lucroReal)}</div></div>
      <div style="text-align:center"><div style="font-size:11px;opacity:.8">Com aluguel</div><div style="font-size:22px;font-weight:800">${fmtR(lucroFinal)}</div></div>
    </div>
  </div>
  <div class="kpi-grid">
    <div class="kpi"><div class="val" style="color:#10b981">${fmtR(tot.bruto)}</div><div class="lbl">Faturamento</div></div>
    <div class="kpi"><div class="val" style="color:#ef4444">${fmtR(tot.gastos)}</div><div class="lbl">Gastos</div></div>
    <div class="kpi"><div class="val" style="color:#8b5cf6">${fmtR(lHora)}/h</div><div class="lbl">Lucro/hora</div></div>
    <div class="kpi"><div class="val" style="color:#06b6d4">R$ ${lKm.toFixed(2).replace('.',',')}/km</div><div class="lbl">Lucro/km</div></div>
    <div class="kpi"><div class="val" style="color:#374151">${tot.km} km</div><div class="lbl">KM rodados</div></div>
    <div class="kpi"><div class="val" style="color:#374151">${tot.horas.toFixed(1)}h</div><div class="lbl">Horas</div></div>
    <div class="kpi"><div class="val" style="color:#f59e0b">${tot.corridas}</div><div class="lbl">Corridas</div></div>
    <div class="kpi"><div class="val" style="color:#2563eb">${fmtR(mediaCorr)}</div><div class="lbl">Média/corrida</div></div>
  </div>
  <div class="mot-card"><div style="font-weight:700;margin-bottom:10px">📅 Dias da Semana</div>
    ${jSem.length===0?'<p style="color:#9ca3af;font-size:13px;text-align:center">Nenhum dia lançado.</p>':''}
    ${jSem.sort((a,b)=>new Date(b.data)-new Date(a.data)).map(j=>{const d=calcJornada(j,carro);return`<div style="padding:9px 0;border-bottom:1px solid #f3f4f6">
      <div style="display:flex;justify-content:space-between"><span style="font-size:13px;font-weight:600">${fmt(j.data)}</span><span style="font-size:13px;font-weight:700;color:${d.lucroReal>=0?'#10b981':'#ef4444'}">${fmtR(d.lucroReal)}</span></div>
      <div style="font-size:12px;color:#6b7280">Bruto:${fmtR(d.bruto)} | Gastos:${fmtR(d.gastos)} | ${d.km}km | ${d.horas}h | ${j.corridas||0} corridas</div>
    </div>`;}).join('')}
  </div>`;
}

// ─── ABA MÊS ──────────────────────────────────────────────────────────────
function renderMotMes(user,carro,mot){
  const agora=new Date();
  const jMes=(state.jornadas||[]).filter(j=>{const d=new Date(j.data+'T12:00:00');return d.getMonth()===agora.getMonth()&&d.getFullYear()===agora.getFullYear()&&j.motorista_id===user.motorista_id;});
  const tot=jMes.reduce((a,j)=>{const d=calcJornada(j,carro);return{bruto:a.bruto+d.bruto,gastos:a.gastos+d.gastos,km:a.km+d.km,horas:a.horas+d.horas,lucroReal:a.lucroReal+d.lucroReal,corridas:a.corridas+(Number(j.corridas||0))};},{bruto:0,gastos:0,km:0,horas:0,lucroReal:0,corridas:0});
  const cfg=mot.config||{};
  const alugMes=Number(cfg.aluguel_semanal||0)*4;
  const lucroFinal=tot.lucroReal-alugMes;
  const metaMes=Number(cfg.meta_mensal||0);
  const prog=metaMes>0?Math.min(100,(tot.bruto/metaMes)*100):0;
  const dias=jMes.filter(j=>j.bruto>0).length;
  const mediaDia=dias>0?(tot.bruto/dias):0;
  const diasRest=new Date(agora.getFullYear(),agora.getMonth()+1,0).getDate()-agora.getDate();
  const previsao=tot.bruto+(mediaDia*diasRest);
  const lHora=tot.horas>0?(tot.lucroReal/tot.horas):0;
  const lKm=tot.km>0?(tot.lucroReal/tot.km):0;
  const mediaCorr=tot.corridas>0?(tot.bruto/tot.corridas):0;
  const porCat={};jMes.forEach(j=>(j.gastos||[]).forEach(g=>{porCat[g.categoria]=(porCat[g.categoria]||0)+Number(g.valor||0);}));
  return `
  ${metaMes>0?`<div class="mot-card">
    <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px"><span style="font-weight:600">🎯 Meta Mensal: ${fmtR(metaMes)}</span><span style="font-weight:700;color:${prog>=100?'#10b981':'#2563eb'}">${prog.toFixed(0)}%</span></div>
    <div class="progress-bar"><div class="progress-fill" style="width:${prog}%;background:${prog>=100?'#10b981':'#2563eb'}"></div></div>
  </div>`:''}
  <div class="mot-stat">
    <div style="font-size:12px;opacity:.8;margin-bottom:6px">📆 ${agora.toLocaleString('pt-BR',{month:'long',year:'numeric'})}</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div style="text-align:center"><div style="font-size:11px;opacity:.8">Sem aluguel</div><div style="font-size:22px;font-weight:800">${fmtR(tot.lucroReal)}</div></div>
      <div style="text-align:center"><div style="font-size:11px;opacity:.8">Com aluguel</div><div style="font-size:22px;font-weight:800">${fmtR(lucroFinal)}</div></div>
    </div>
  </div>
  <div class="kpi-grid">
    <div class="kpi"><div class="val" style="color:#10b981">${fmtR(tot.bruto)}</div><div class="lbl">Faturamento</div></div>
    <div class="kpi"><div class="val" style="color:#ef4444">${fmtR(tot.gastos)}</div><div class="lbl">Gastos</div></div>
    <div class="kpi"><div class="val" style="color:#f59e0b">${dias} dias</div><div class="lbl">Dias trabalhados</div></div>
    <div class="kpi"><div class="val" style="color:#2563eb">${fmtR(mediaDia)}</div><div class="lbl">Média/dia</div></div>
    <div class="kpi"><div class="val" style="color:#8b5cf6">${fmtR(lHora)}/h</div><div class="lbl">Lucro/hora</div></div>
    <div class="kpi"><div class="val" style="color:#06b6d4">R$ ${lKm.toFixed(2).replace('.',',')}/km</div><div class="lbl">Lucro/km</div></div>
    <div class="kpi"><div class="val" style="color:#374151">${tot.corridas}</div><div class="lbl">Corridas</div></div>
    <div class="kpi"><div class="val" style="color:#f59e0b">${fmtR(mediaCorr)}</div><div class="lbl">Média/corrida</div></div>
    <div class="kpi"><div class="val" style="color:#10b981">${fmtR(previsao)}</div><div class="lbl">Previsão mês</div></div>
  </div>
  ${Object.keys(porCat).length>0?`<div class="mot-card"><div style="font-weight:700;margin-bottom:10px">📤 Gastos por Categoria</div>
    ${Object.entries(porCat).sort((a,b)=>b[1]-a[1]).map(([c,v])=>`<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #f3f4f6"><span style="font-size:13px">${c}</span><span style="font-size:13px;font-weight:700;color:#ef4444">${fmtR(v)}</span></div>`).join('')}
  </div>`:''}`;
}

// ─── ABA VEÍCULO ──────────────────────────────────────────────────────────

  <div class="mot-card" style="text-align:center">
    <div style="font-weight:700;margin-bottom:8px">📞 Suporte MGP</div>
    <p style="font-size:13px;color:#6b7280;margin-bottom:14px">Precisa de ajuda? Fale com a MGP!</p>
    <a href="https://wa.me/55" style="background:#25d366;color:#fff;border-radius:10px;padding:10px 24px;font-weight:700;font-size:14px;text-decoration:none;display:inline-block">💬 WhatsApp MGP</a>
  </div>`;
}

// ─── ABA CONFIG ───────────────────────────────────────────────────────────
function renderMotConfig(user,mot){
  const cfg=mot.config||{};
  return `
  <div class="mot-card">
    <div style="font-weight:700;font-size:15px;margin-bottom:12px">🎯 Metas e Configurações</div>
    <div class="field"><label>Aluguel Semanal (R$) — usado nos cálculos</label><input type="number" id="cfg-alg" step="0.01" value="${cfg.aluguel_semanal||''}"/></div>
    <div class="field"><label>Meta Diária (R$)</label><input type="number" id="cfg-dia" step="0.01" value="${cfg.meta_diaria||''}"/></div>
    <div class="field"><label>Meta Semanal (R$)</label><input type="number" id="cfg-sem" step="0.01" value="${cfg.meta_semanal||''}"/></div>
    <div class="field"><label>Meta Mensal (R$)</label><input type="number" id="cfg-mes" step="0.01" value="${cfg.meta_mensal||''}"/></div>
    <div class="field"><label>🏆 Nome no Ranking (pode ser fictício)</label><input id="cfg-nick" placeholder="Ex: Relâmpago, Monstro..." value="${mot.nome_ficticio||''}"/></div>
    <button class="btn btn-primary btn-block" onclick="salvarConfig('${user.motorista_id}')">💾 Salvar</button>
  </div>
  <div class="mot-card">
    <div style="font-weight:700;font-size:15px;margin-bottom:12px">🔑 Alterar Senha</div>
    <div class="field"><label>Senha Atual</label><input type="password" id="ms-a"/></div>
    <div class="field"><label>Nova Senha</label><input type="password" id="ms-n"/></div>
    <div class="field"><label>Confirmar</label><input type="password" id="ms-c"/></div>
    <button class="btn btn-primary btn-block" onclick="alterarSenhaMot()">Salvar Nova Senha</button>
  </div>`;
}

window.salvarConfig=async motId=>{
  await fbUpd('motoristas',motId,{config:{aluguel_semanal:Number($('cfg-alg')?.value||0),meta_diaria:Number($('cfg-dia')?.value||0),meta_semanal:Number($('cfg-sem')?.value||0),meta_mensal:Number($('cfg-mes')?.value||0)},nome_ficticio:$('cfg-nick')?.value||''});
  toast('Configurações salvas! ✅');
};

window.alterarSenhaMot=async()=>{
  const a=$('ms-a').value,n=$('ms-n').value,c=$('ms-c').value;
  if(a!==currentUser.senha)return alert('Senha atual incorreta.');
  if(n.length<4)return alert('Mínimo 4 caracteres.');
  if(n!==c)return alert('As senhas não coincidem.');
  await fbUpd('usuarios',currentUser.id,{senha:n});currentUser.senha=n;
  toast('Senha alterada! ✅');
};

// ─── JORNADA ──────────────────────────────────────────────────────────────
window.iniciarJornada=async(motId,data)=>{
  const j=(state.jornadas||[]).find(x=>x.data===data&&x.motorista_id===motId);
  const agora=new Date().toISOString();
  if(j) await fbUpd('jornadas',j.id,{jornada_ativa:true,jornada_inicio:agora});
  else await fbAdd('jornadas',{motorista_id:motId,data,jornada_ativa:true,jornada_inicio:agora,horas_segundos:0,bruto:0,km:0,horas:0,corridas:0,gastos:[],receitas:[]});
  toast('Jornada iniciada! ✅');
};

window.pausarJornada=async(motId,data)=>{
  const j=(state.jornadas||[]).find(x=>x.data===data&&x.motorista_id===motId);if(!j)return;
  const segs=Math.floor((new Date()-new Date(j.jornada_inicio))/1000);
  await fbUpd('jornadas',j.id,{jornada_ativa:false,jornada_inicio:null,horas_segundos:(j.horas_segundos||0)+segs});
  toast('Jornada pausada! ⏸');
};

window.zerarJornada=async(motId,data)=>{
  if(!confirm('Zerar o cronômetro de hoje?'))return;
  const j=(state.jornadas||[]).find(x=>x.data===data&&x.motorista_id===motId);
  if(j) await fbUpd('jornadas',j.id,{jornada_ativa:false,jornada_inicio:null,horas_segundos:0,horas:0});
  toast('Cronômetro zerado! 🔄');
};

window.salvarFaturamento=async(motId,data)=>{
  const bruto=Number($('mot-bruto')?.value||0),km=Number($('mot-km')?.value||0),horas=Number($('mot-horas')?.value||0),corridas=Number($('mot-corridas')?.value||0);
  const j=(state.jornadas||[]).find(x=>x.data===data&&x.motorista_id===motId);
  if(j) await fbUpd('jornadas',j.id,{bruto,km,horas,corridas});
  else await fbAdd('jornadas',{motorista_id:motId,data,bruto,km,horas,corridas,horas_segundos:0,jornada_ativa:false,gastos:[],receitas:[]});
  toast('Faturamento salvo! ✅');
};

window.abrirModalReceita=(motId,data)=>{
  openModal('Nova Receita por Plataforma',`
    <div class="field"><label>Plataforma</label><select id="f-pl"><option>Uber</option><option>99</option><option>InDrive</option><option>Particular</option><option>Outro</option></select></div>
    <div class="field"><label>Valor Bruto (R$) *</label><input type="number" id="f-rb" step="0.01"/></div>
    <div class="field"><label>Comissão da Plataforma (%)</label><input type="number" id="f-rc" step="0.1" placeholder="Ex: 25 para Uber"/></div>
    <div class="grid2"><div class="field"><label>Gorjeta (R$)</label><input type="number" id="f-rg" step="0.01" value="0"/></div><div class="field"><label>Bônus (R$)</label><input type="number" id="f-rbo" step="0.01" value="0"/></div></div>
  `,async()=>{
    const bruto=Number($('f-rb').value);if(!bruto)return alert('Informe o valor bruto.');
    const j=(state.jornadas||[]).find(x=>x.data===data&&x.motorista_id===motId);
    const r={plataforma:$('f-pl').value,bruto,comissao:Number($('f-rc').value||0),gorjeta:Number($('f-rg').value||0),bonus:Number($('f-rbo').value||0)};
    if(j) await fbUpd('jornadas',j.id,{receitas:[...(j.receitas||[]),r]});
    else await fbAdd('jornadas',{motorista_id:motId,data,bruto:0,km:0,horas:0,corridas:0,horas_segundos:0,jornada_ativa:false,gastos:[],receitas:[r]});
    closeModal();toast('Receita adicionada! ✅');
  });
};

window.removerReceita=async(motId,data,idx)=>{
  const j=(state.jornadas||[]).find(x=>x.data===data&&x.motorista_id===motId);if(!j)return;
  await fbUpd('jornadas',j.id,{receitas:j.receitas.filter((_,i)=>i!==idx)});toast('Removido.');
};

window.abrirModalGasto=(motId,data)=>{
  openModal('Adicionar Gasto',`
    <div class="field"><label>Categoria</label><select id="f-gc">
      <option>🍔 Alimentação</option><option>⛽ Combustível</option><option>🅿️ Estacionamento</option>
      <option>🔧 Manutenção</option><option>🛣️ Pedágio</option><option>🚿 Lavagem</option>
      <option>📱 Internet/Dados</option><option>💊 Saúde</option><option>🛒 Outros</option>
    </select></div>
    <div class="field"><label>Valor (R$) *</label><input type="number" id="f-gv" step="0.01"/></div>
    <div class="field"><label>Descrição (opcional)</label><input id="f-gd" placeholder="Ex: Almoço, posto Shell..."/></div>
  `,async()=>{
    const val=Number($('f-gv').value);if(!val)return alert('Informe o valor.');
    const j=(state.jornadas||[]).find(x=>x.data===data&&x.motorista_id===motId);
    const g={categoria:$('f-gc').value,valor:val,descricao:$('f-gd').value};
    if(j) await fbUpd('jornadas',j.id,{gastos:[...(j.gastos||[]),g]});
    else await fbAdd('jornadas',{motorista_id:motId,data,bruto:0,km:0,horas:0,corridas:0,horas_segundos:0,jornada_ativa:false,gastos:[g],receitas:[]});
    closeModal();toast('Gasto adicionado! ✅');
  });
};

window.removerGasto=async(motId,data,idx)=>{
  const j=(state.jornadas||[]).find(x=>x.data===data&&x.motorista_id===motId);if(!j)return;
  await fbUpd('jornadas',j.id,{gastos:j.gastos.filter((_,i)=>i!==idx)});toast('Removido.');
};

window.abrirModalAbast=(motId,carroId)=>{
  openModal('Registrar Abastecimento',`
    <div class="grid2"><div class="field"><label>Data</label><input type="date" id="ab-d" value="${todayStr()}"/></div><div class="field"><label>Litros</label><input type="number" id="ab-l" step="0.01" placeholder="Ex: 30"/></div></div>
    <div class="grid2"><div class="field"><label>Valor Total (R$)</label><input type="number" id="ab-v" step="0.01"/></div><div class="field"><label>KM Atual</label><input type="number" id="ab-km"/></div></div>
  `,async()=>{
    const litros=Number($('ab-l')?.value||0),valor=Number($('ab-v')?.value||0);
    if(!litros||!valor)return alert('Preencha litros e valor.');
    await fbAdd('abastecimentos',{motorista_id:motId,carro_id:carroId,data:$('ab-d').value,litros,valor,km_atual:Number($('ab-km')?.value||0)});
    closeModal();toast('Abastecimento registrado! ✅');
  });
};

// ─── TIMER ────────────────────────────────────────────────────────────────
const formatarTempo=s=>{const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),ss=s%60;return`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;};

function iniciarTimerDisplay(user){
  if(jornadaTimer)clearInterval(jornadaTimer);
  jornadaTimer=setInterval(()=>{
    const td=$('timer-display');if(!td)return clearInterval(jornadaTimer);
    const j=getJornada(user,todayStr());
    let s=j.horas_segundos||0;
    if(j.jornada_ativa&&j.jornada_inicio) s+=Math.floor((new Date()-new Date(j.jornada_inicio))/1000);
    td.textContent=formatarTempo(s);
  },1000);
}

inicializarUsuarios();
</script>

</body>
