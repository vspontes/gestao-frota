<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MGP Locadora</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f3f4f6;min-height:100vh}
.hidden{display:none!important}
input,select,textarea{width:100%;padding:9px 12px;border:1.5px solid #e5e7eb;border-radius:10px;font-size:14px;font-family:inherit;background:#fff;transition:border .2s}
input:focus,select:focus{outline:none;border-color:#2563eb}
.field{margin-bottom:12px}
label{display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:4px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.btn{cursor:pointer;border:none;border-radius:10px;font-weight:600;display:inline-flex;align-items:center;gap:6px;font-family:inherit;font-size:14px;padding:9px 18px;transition:opacity .15s}
.btn:hover{opacity:.85}
.btn-primary{background:linear-gradient(135deg,#1e3a5f,#2563eb);color:#fff}
.btn-danger{background:#ef4444;color:#fff}
.btn-ghost{background:transparent;color:#2563eb;border:1.5px solid #2563eb}
.btn-green{background:#10b981;color:#fff}
.btn-sm{padding:5px 12px;font-size:13px}
.btn-block{width:100%;justify-content:center}
.card{background:#fff;border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.card.accent-green{border-left:4px solid #10b981}
.card.accent-yellow{border-left:4px solid #f59e0b}
.card.accent-red{border-left:4px solid #ef4444}
.card.accent-blue{border-left:4px solid #2563eb}
.badge{border-radius:20px;padding:3px 10px;font-size:12px;font-weight:600}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:12px}
.modal-box{background:#fff;border-radius:14px;padding:24px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.modal-header h3{font-size:17px;color:#1e3a5f;font-weight:700}
.modal-close{background:none;border:none;font-size:24px;cursor:pointer;color:#6b7280}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:12px}
.page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.page-header h2{color:#1e3a5f;font-size:20px;font-weight:700}
.empty{color:#9ca3af;font-size:14px;padding:20px 0;text-align:center}
.card-row{display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px}
.row-actions{display:flex;gap:6px;align-items:flex-start;flex-shrink:0}
.toast{position:fixed;bottom:20px;right:20px;background:#1e3a5f;color:#fff;padding:12px 20px;border-radius:10px;font-size:14px;z-index:999;opacity:0;transition:opacity .3s;max-width:280px}
.toast.show{opacity:1}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:12px;margin-bottom:24px}
.stat-card{background:#fff;border-radius:12px;padding:14px;display:flex;align-items:center;gap:12px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.fleet-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.filter-bar{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.total-badge{background:#eff6ff;border-radius:8px;padding:7px 16px;font-weight:700;color:#2563eb}
.doc-item{margin-bottom:12px;border:1px solid #e5e7eb;border-radius:8px;padding:10px}
.doc-item img{max-width:100%;border-radius:6px;margin-top:6px}
/* SIDEBAR - Desktop */
#sidebar{width:220px;background:#1e3a5f;flex-shrink:0;display:flex;flex-direction:column;min-height:100vh;position:fixed;top:0;left:0;z-index:50}
#main{margin-left:220px;flex:1;padding:24px;min-height:100vh}
.nav-btn{width:100%;background:transparent;color:#93c5fd;border:none;border-radius:8px;padding:10px 14px;cursor:pointer;display:flex;align-items:center;gap:10px;font-size:13px;font-weight:400;margin-bottom:2px;text-align:left;transition:background .15s}
.nav-btn.active{background:#2563eb;color:#fff;font-weight:700}
.sidebar-logo{padding:20px 16px 14px;border-bottom:1px solid #2d4f7c;text-align:center}
.sidebar-footer{padding:10px 8px;border-top:1px solid #2d4f7c}
/* TOPBAR MOBILE */
#topbar{display:none;position:fixed;top:0;left:0;right:0;height:56px;background:#1e3a5f;z-index:50;align-items:center;padding:0 16px;gap:12px}
#topbar-title{color:#fff;font-weight:700;font-size:15px;flex:1}
#hamburger{display:flex;flex-direction:column;gap:5px;cursor:pointer;padding:6px}
#hamburger span{width:22px;height:2px;background:#fff;border-radius:2px;display:block}
#mobile-menu{position:fixed;top:56px;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:49;display:none}
#mobile-menu.open{display:block}
#mobile-menu-inner{background:#1e3a5f;width:240px;height:100%;padding:12px 8px;overflow-y:auto}
.mobile-nav-btn{width:100%;background:transparent;color:#93c5fd;border:none;border-radius:8px;padding:12px 14px;cursor:pointer;display:flex;align-items:center;gap:10px;font-size:14px;margin-bottom:4px;text-align:left}
.mobile-nav-btn.active{background:#2563eb;color:#fff;font-weight:700}
@media(max-width:768px){
  #sidebar{display:none!important}
  #topbar{display:flex!important}
  #main{margin-left:0!important;margin-top:56px;padding:14px}
}
/* ÁREA DO MOTORISTA */
#motorista-app{min-height:100vh;background:#f3f4f6}
.mot-header{background:linear-gradient(135deg,#1e3a5f,#2563eb);padding:24px 20px;color:#fff}
.mot-card{background:#fff;border-radius:14px;padding:18px;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.mot-stat{background:linear-gradient(135deg,#1e3a5f,#2563eb);border-radius:14px;padding:18px;color:#fff;margin-bottom:14px}
.progress-bar{background:rgba(255,255,255,.3);border-radius:10px;height:10px;margin-top:8px;overflow:hidden}
.progress-fill{background:#fff;height:100%;border-radius:10px;transition:width .5s}
</style>
</head>
<body>

<!-- LOGIN -->

          <text x="200" y="248" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="26" font-weight="900" fill="#1e3a5f" letter-spacing="3">DE VEÍCULOS</text>

    </div>

</div>

<!-- APP ADMIN/FUNCIONÁRIO -->

<div id="app" class="hidden" style="display:flex;min-height:100vh">
  <div id="sidebar">
    <div class="sidebar-logo">
      <svg viewBox="0 0 400 300" width="50" height="38" xmlns="http://www.w3.org/2000/svg">
        <path d="M20,40 L20,160 L50,160 L50,90 L80,160 L110,90 L110,160 L140,160 L140,40 L110,40 L80,110 L50,40 Z" fill="#fff"/>
        <path d="M160,100 C160,60 190,35 225,35 C255,35 278,52 285,72 L260,82 C255,68 243,58 225,58 C203,58 185,76 185,100 C185,124 203,142 225,142 C243,142 256,132 261,118 L235,118 L235,97 L285,97 L285,160 L265,160 L265,146 C255,156 242,162 225,162 C190,162 160,140 160,100 Z" fill="#fff"/>
        <path d="M300,40 L300,160 L325,160 L325,115 L355,115 C378,115 395,99 395,77 C395,55 378,40 355,40 Z M325,62 L352,62 C363,62 370,68 370,77 C370,87 363,93 352,93 L325,93 Z" fill="#fff"/>

    </div>
    <nav style="flex:1;padding:10px 8px" id="sidebar-nav"></nav>
    <div class="sidebar-footer">
      <button class="nav-btn" onclick="doLogout()">🚪 Sair</button>
    </div>

  <!-- TOPBAR MOBILE -->
  <div id="topbar">
    <svg viewBox="0 0 400 300" width="36" height="27" xmlns="http://www.w3.org/2000/svg">
      <path d="M20,40 L20,160 L50,160 L50,90 L80,160 L110,90 L110,160 L140,160 L140,40 L110,40 L80,110 L50,40 Z" fill="#fff"/>
      <path d="M160,100 C160,60 190,35 225,35 C255,35 278,52 285,72 L260,82 C255,68 243,58 225,58 C203,58 185,76 185,100 C185,124 203,142 225,142 C243,142 256,132 261,118 L235,118 L235,97 L285,97 L285,160 L265,160 L265,146 C255,156 242,162 225,162 C190,162 160,140 160,100 Z" fill="#fff"/>
      <path d="M300,40 L300,160 L325,160 L325,115 L355,115 C378,115 395,99 395,77 C395,55 378,40 355,40 Z M325,62 L352,62 C363,62 370,68 370,77 C370,87 363,93 352,93 L325,93 Z" fill="#fff"/>

<div id="motorista-app" class="hidden">
  <div class="mot-header">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div>
        <svg viewBox="0 0 400 300" width="60" height="45" xmlns="http://www.w3.org/2000/svg">
          <path d="M20,40 L20,160 L50,160 L50,90 L80,160 L110,90 L110,160 L140,160 L140,40 L110,40 L80,110 L50,40 Z" fill="#fff"/>

<div id="toast" class="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc, onSnapshot, query, where, getDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCiyTqzSeCPG_SPaSqe7RFDbuYGO15RAj8",
  authDomain: "frota-carros-67e9e.firebaseapp.com",
  projectId: "frota-carros-67e9e",
  storageBucket: "frota-carros-67e9e.firebasestorage.app",
  messagingSenderId: "708276056895",
  appId: "1:708276056895:web:890c4f40df6b8d961d198a"
};

const firebase = initializeApp(firebaseConfig);
const db = getFirestore(firebase);

// ── STATE ─────────────────────────────────────────────────────────────────
let state = { carros:[], motoristas:[], pagamentos:[], manutencoes:[], multas:[], usuarios:[] };
let currentPage = 'dashboard';
let currentUser = null;

// ── UTILS ─────────────────────────────────────────────────────────────────
const fmt = d => d ? new Date(d+'T12:00:00').toLocaleDateString('pt-BR') : '—';
const todayStr = () => new Date().toISOString().split('T')[0];
const $ = id => document.getElementById(id);
const toast = msg => { const t=$('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500); };
const fileToBase64 = f => new Promise(r=>{ const fr=new FileReader(); fr.onload=e=>r({name:f.name,type:f.type,data:e.target.result}); fr.readAsDataURL(f); });

// ── FIREBASE ──────────────────────────────────────────────────────────────
async function fbAdd(col, data){ const ref = await addDoc(collection(db,col),{...data,criadoEm:new Date().toISOString()}); return ref.id; }
async function fbDel(col, id){ await deleteDoc(doc(db,col,id)); }
async function fbUpd(col, id, data){ await updateDoc(doc(db,col,id),data); }
function fbListen(col, cb){ return onSnapshot(query(collection(db,col)), snap=>{ const docs=[]; snap.forEach(d=>docs.push({id:d.id,...d.data()})); cb(docs); }); }

// ── CRIAR ADMIN PADRÃO ────────────────────────────────────────────────────
async function inicializarUsuarios(){
  const snap = await getDocs(collection(db,'usuarios'));
  if(snap.empty){
    await fbAdd('usuarios',{nome:'Administrador',login:'admin',telefone:'',senha:'mgp123',perfil:'admin',ativo:true});
  }
}

// ── AUTH ──────────────────────────────────────────────────────────────────
window.doLogin = async () => {
  const u=$('login-user').value.trim().toLowerCase();
  const s=$('login-pass').value;
  if(!u||!s){ $('login-err').style.display='block'; $('login-err').textContent='⚠️ Preencha usuário e senha.'; return; }
  const snap = await getDocs(collection(db,'usuarios'));
  let found = null;
  snap.forEach(d=>{ const usr={id:d.id,...d.data()}; if((usr.login?.toLowerCase()===u||usr.telefone===u)&&usr.senha===s&&usr.ativo!==false) found=usr; });
  if(!found){ $('login-err').style.display='block'; $('login-err').textContent='⚠️ Usuário ou senha incorretos.'; return; }
  currentUser = found;
  $('login-err').style.display='none';
  $('login-screen').classList.add('hidden');
  if(found.perfil==='motorista') iniciarMotorista(found);
  else iniciarAdmin(found);
};

window.doLogout = () => {
  currentUser=null;
  $('app').classList.add('hidden');
  $('motorista-app').classList.add('hidden');
  $('login-screen').classList.remove('hidden');
  $('login-user').value=''; $('login-pass').value='';
};

window.mostrarEsqueceuSenha = () => {
  openModal('Esqueceu a senha?',`
    <p style="font-size:14px;color:#6b7280;margin-bottom:16px">Digite seu usuário ou telefone. Sua senha será redefinida para <b>mgp123</b>.</p>
    <div class="field"><label>Usuário ou Telefone</label><input id="f-reset-user" placeholder="Digite aqui..."/></div>
  `, async ()=>{
    const u=$('f-reset-user').value.trim().toLowerCase();
    const snap=await getDocs(collection(db,'usuarios'));
    let found=null;
    snap.forEach(d=>{ const usr={id:d.id,...d.data()}; if(usr.login?.toLowerCase()===u||usr.telefone===u) found=usr; });
    if(!found) return alert('Usuário não encontrado.');
    await fbUpd('usuarios',found.id,{senha:'mgp123'});
    closeModal(); toast('Senha redefinida para mgp123! ✅');
  });
};

// ── ADMIN ─────────────────────────────────────────────────────────────────
function iniciarAdmin(user){
  $('app').classList.remove('hidden');
  $('sidebar-user-name').textContent = user.perfil==='admin'?'👑 Admin':'⚙️ Funcionário';
  buildMenu(user.perfil);
  initListeners();
  goTo('dashboard');
}

function buildMenu(perfil){
  const pages=[
    {id:'dashboard',emoji:'📊',label:'Dashboard'},
    {id:'veiculos',emoji:'🚗',label:'Veículos'},
    {id:'motoristas',emoji:'👤',label:'Motoristas'},
    {id:'pagamentos',emoji:'💰',label:'Pagamentos'},
    {id:'manutencoes',emoji:'🔧',label:'Manutenções'},
    {id:'multas',emoji:'🚨',label:'Multas'},
    ...(perfil==='admin'?[{id:'usuarios',emoji:'👥',label:'Usuários'}]:[]),
    {id:'minhaconta',emoji:'🔑',label:'Minha Conta'},
  ];
  const nav=$('sidebar-nav'), mnav=$('mobile-nav');
  nav.innerHTML=''; mnav.innerHTML='';
  pages.forEach(p=>{
    nav.innerHTML+=`<button class="nav-btn" onclick="goTo('${p.id}')" id="nav-${p.id}">${p.emoji} ${p.label}</button>`;
    mnav.innerHTML+=`<button class="mobile-nav-btn" id="mnav-${p.id}" onclick="goTo('${p.id}');toggleMenu()">${p.emoji} ${p.label}</button>`;
  });
}

function initListeners(){
  fbListen('carros', d=>{ state.carros=d; renderPage(); });
  fbListen('motoristas', d=>{ state.motoristas=d; renderPage(); });
  fbListen('pagamentos', d=>{ state.pagamentos=d; renderPage(); });
  fbListen('manutencoes', d=>{ state.manutencoes=d; renderPage(); });
  fbListen('multas', d=>{ state.multas=d; renderPage(); });
  fbListen('usuarios', d=>{ state.usuarios=d; renderPage(); });
}

window.toggleMenu = () => $('mobile-menu').classList.toggle('open');

window.goTo = page => {
  currentPage=page;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.mobile-nav-btn').forEach(b=>b.classList.remove('active'));
  $('nav-'+page)?.classList.add('active');
  $('mnav-'+page)?.classList.add('active');
  ['dashboard','veiculos','motoristas','pagamentos','manutencoes','multas','usuarios','minhaconta'].forEach(p=>{
    $('page-'+p)?.classList.toggle('hidden',p!==page);
  });
  renderPage();
};

function renderPage(){
  if(!currentUser||currentUser.perfil==='motorista') return;
  if(currentPage==='dashboard') renderDashboard();
  else if(currentPage==='veiculos') renderVeiculos();
  else if(currentPage==='motoristas') renderMotoristas();
  else if(currentPage==='pagamentos') renderPagamentos();
  else if(currentPage==='manutencoes') renderManutencoes();
  else if(currentPage==='multas') renderMultas();
  else if(currentPage==='usuarios') renderUsuarios();
  else if(currentPage==='minhaconta') renderMinhaConta();
}

// ── MODAL ─────────────────────────────────────────────────────────────────
window.openModal = (title,body,onSave)=>{
  const e=$('modal-overlay'); if(e) e.remove();
  const d=document.createElement('div'); d.id='modal-overlay'; d.className='modal-overlay';
  d.innerHTML=`<div class="modal-box"><div class="modal-header"><h3>${title}</h3><button class="modal-close" onclick="closeModal()">×</button></div><div id="modal-body">${body}</div><div class="modal-footer"><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" id="modal-save-btn">Salvar</button></div></div>`;
  document.body.appendChild(d);
  $('modal-save-btn').onclick=onSave;
};
window.closeModal = ()=>{ const m=$('modal-overlay'); if(m) m.remove(); };

window.verDocs = docsJSON => {
  const docs=JSON.parse(docsJSON);
  const body=docs.length===0?'<p class="empty">Nenhum documento.</p>':docs.map(d=>`<div class="doc-item"><b style="font-size:13px">${d.name}</b>${d.type.startsWith('image/')?`<img src="${d.data}" alt="${d.name}"/>`:`<br><a href="${d.data}" download="${d.name}" style="color:#2563eb;font-size:13px">⬇ Baixar PDF</a>`}</div>`).join('');
  const div=document.createElement('div'); div.id='modal-overlay'; div.className='modal-overlay';
  div.innerHTML=`<div class="modal-box"><div class="modal-header"><h3>Documentos</h3><button class="modal-close" onclick="closeModal()">×</button></div>${body}</div>`;
  document.body.appendChild(div);
};

// DASHBOARD
// ══════════════════════════════════════════════════════════════════════════
function renderDashboard(){
  const {carros,motoristas,pagamentos,manutencoes,multas}=state;
  const totalRec=pagamentos.reduce((a,p)=>a+Number(p.valor||0),0);
  const semMot=carros.filter(c=>!c.motorista_id).length;
  const multPend=multas.filter(m=>!m.pago).length;
  const manPend=manutencoes.filter(m=>!m.ok).length;
  const stats=[
    {label:'Veículos',value:carros.length,emoji:'🚗',color:'#2563eb'},
    {label:'Com Motorista',value:carros.length-semMot,emoji:'✅',color:'#10b981'},
    {label:'Sem Motorista',value:semMot,emoji:'⚠️',color:'#f59e0b'},
    {label:'Total Recebido',value:`R$ ${totalRec.toFixed(2).replace('.',',')}`,emoji:'💰',color:'#8b5cf6'},
    {label:'Manutenções Pendentes',value:manPend,emoji:'🔧',color:'#06b6d4'},
    {label:'Multas Pendentes',value:multPend,emoji:'🚨',color:'#ef4444'},
  ];
  $('page-dashboard').innerHTML=`
    <h2 style="color:#1e3a5f;margin-bottom:16px">Dashboard</h2>
    <div class="stats-grid">${stats.map(s=>`<div class="stat-card"><span style="font-size:26px">${s.emoji}</span><div><div style="font-size:20px;font-weight:700;color:${s.color}">${s.value}</div><div style="font-size:11px;color:#6b7280">${s.label}</div></div></div>`).join('')}</div>
    <h3 style="color:#1e3a5f;margin-bottom:12px">Frota</h3>
    ${carros.length===0?'<p class="empty">Nenhum veículo cadastrado ainda.</p>':''}
    <div class="fleet-grid">${carros.map(c=>{
      const mot=motoristas.find(m=>m.id===c.motorista_id);
      const total=pagamentos.filter(p=>p.carro_id===c.id).reduce((a,p)=>a+Number(p.valor||0),0);
      return `<div class="card ${mot?'accent-green':'accent-yellow'}">
        <div style="font-weight:700;font-size:15px">${c.modelo}</div>
        <div style="font-size:13px;color:#6b7280">${c.placa}</div>
        <div style="font-size:13px;margin-top:8px">👤 ${mot?mot.nome:'Sem motorista'}</div>
        <div style="font-size:13px">💰 R$ ${total.toFixed(2).replace('.',',')} recebidos</div>
      </div>`;
    }).join('')}</div>`;
}

function renderPagamentos(){
  const {pagamentos,carros}=state;
  const filtro=window._filtroCarroPag||'';
  const lista=filtro?pagamentos.filter(p=>p.carro_id===filtro):pagamentos;
  const total=lista.reduce((a,p)=>a+Number(p.valor||0),0);
  $('page-pagamentos').innerHTML=`
    <div class="page-header"><h2>Pagamentos</h2><button class="btn btn-primary" onclick="abrirModalPag()">+ Registrar</button></div>
    <div class="filter-bar">
      <select onchange="window._filtroCarroPag=this.value;renderPage()" style="padding:7px 12px;border:1px solid #d1d5db;border-radius:8px;font-size:14px;width:auto">
        <option value="">Todos os veículos</option>
        ${carros.map(c=>`<option value="${c.id}"${filtro===c.id?' selected':''}>${c.modelo} — ${c.placa}</option>`).join('')}
      </select>
      <div class="total-badge">Total: R$ ${total.toFixed(2).replace('.',',')}</div>
    </div>
    ${lista.length===0?'<p class="empty">Nenhum pagamento registrado.</p>':''}
    ${lista.map(p=>`<div class="card">
      <div class="card-row">
        <div>
          <span style="font-weight:700;font-size:16px;color:#10b981">R$ ${Number(p.valor).toFixed(2).replace('.',',')}</span>
          <span style="color:#6b7280;font-size:13px;margin-left:10px">${fmt(p.data)}</span>
          <div style="font-size:13px;margin-top:2px">${p.placa||'—'} · ${p.motorista||'—'} · ${p.forma||'—'}</div>
          ${p.descricao?`<div style="font-size:12px;color:#6b7280">${p.descricao}</div>`:''}
        </div>
        <button class="btn btn-danger btn-sm" onclick="delPag('${p.id}')">✕</button>
      </div>
    </div>`).join('')}`;
}

    <div class="field"><label>Quem paga?</label><select id="f-resp"><option value="motorista">Motorista</option><option value="proprietario">Proprietário</option></select></div>
  `, async ()=>{
    const cid=$('f-carro').value, desc=$('f-desc').value.trim();
    if(!cid||!desc) return alert('Selecione o carro e descreva a infração.');
    const c=state.carros.find(x=>x.id===cid);
    const m=state.motoristas.find(x=>x.id===$('f-mot').value);
    await fbAdd('multas',{carro_id:cid,motorista_id:$('f-mot').value,descricao:desc,data:$('f-data').value,vencimento:$('f-venc').value,valor:$('f-valor').value,pontos:$('f-pontos').value,resp:$('f-resp').value,pago:false,placa:c?.placa||'',motorista:m?.nome||'—'});
    closeModal(); toast('Multa registrada! ✅');
  });
};
window.toggleMulta = async (id,val)=>{ await fbUpd('multas',id,{pago:val}); toast(val?'Paga! ✅':'Reaberta.'); };
window.delMulta = async id=>{ if(confirm('Remover?')){ await fbDel('multas',id); toast('Removido.'); }};

// ══════════════════════════════════════════════════════════════════════════
// USUÁRIOS (só admin)
// ══════════════════════════════════════════════════════════════════════════
function renderUsuarios(){
  const {usuarios}=state;
  const perfilLabel={admin:'👑 Admin',funcionario:'⚙️ Funcionário',motorista:'🚗 Motorista'};
  const perfilColor={admin:'#8b5cf6',funcionario:'#2563eb',motorista:'#10b981'};
  $('page-usuarios').innerHTML=`
    <div class="page-header"><h2>Usuários</h2><button class="btn btn-primary" onclick="abrirModalUsuario()">+ Novo Usuário</button></div>
    ${usuarios.length===0?'<p class="empty">Nenhum usuário.</p>':''}
    ${usuarios.map(u=>`<div class="card">
      <div class="card-row">
        <div>
          <div style="font-weight:700;font-size:15px">${u.nome} <span class="badge" style="background:${(perfilColor[u.perfil]||'#6b7280')}22;color:${perfilColor[u.perfil]||'#6b7280'}">${perfilLabel[u.perfil]||u.perfil}</span></div>
          <div style="font-size:13px;color:#6b7280">Login: ${u.login||u.telefone} | Tel: ${u.telefone||'—'}</div>
          <div style="font-size:13px;color:#6b7280">Status: ${u.ativo!==false?'✅ Ativo':'❌ Inativo'}</div>
        </div>
        <div class="row-actions">
          <button class="btn btn-ghost btn-sm" onclick="resetSenha('${u.id}')">🔑 Reset</button>
          <button class="btn btn-danger btn-sm" onclick="delUsuario('${u.id}')">✕</button>
        </div>
      </div>
    </div>`).join('')}`;
}

window.abrirModalUsuario = () => {
  openModal('Novo Usuário',`
    <div class="field"><label>Nome *</label><input id="f-nome"/></div>
    <div class="field"><label>Login *</label><input id="f-login" placeholder="Ex: funcionario1"/></div>
    <div class="field"><label>Telefone</label><input id="f-tel" placeholder="(00) 00000-0000"/></div>
    <div class="field"><label>Perfil</label><select id="f-perfil"><option value="funcionario">⚙️ Funcionário</option><option value="admin">👑 Admin</option></select></div>
    <div style="background:#eff6ff;border-radius:8px;padding:12px;font-size:13px;color:#2563eb">🔑 Senha inicial será <b>mgp123</b></div>
  `, async ()=>{
    const nome=$('f-nome').value.trim(), login=$('f-login').value.trim();
    if(!nome||!login) return alert('Nome e login são obrigatórios.');
    await fbAdd('usuarios',{nome,login,telefone:$('f-tel').value,senha:'mgp123',perfil:$('f-perfil').value,ativo:true});
    closeModal(); toast('Usuário criado! Senha: mgp123 ✅');
  });
};
window.resetSenha = async id=>{ if(confirm('Redefinir senha para mgp123?')){ await fbUpd('usuarios',id,{senha:'mgp123'}); toast('Senha redefinida para mgp123! ✅'); }};
window.delUsuario = async id=>{ if(confirm('Remover usuário?')){ await fbDel('usuarios',id); toast('Removido.'); }};

// ══════════════════════════════════════════════════════════════════════════
// MINHA CONTA
// ══════════════════════════════════════════════════════════════════════════
function renderMinhaConta(){
  $('page-minhaconta').innerHTML=`
    <div class="page-header"><h2>Minha Conta</h2></div>
    <div class="card">
      <h3 style="color:#1e3a5f;margin-bottom:16px">👤 ${currentUser.nome}</h3>
      <div style="font-size:14px;color:#6b7280;margin-bottom:16px">Login: <b>${currentUser.login||currentUser.telefone}</b></div>
      <h4 style="margin-bottom:12px;color:#374151">🔑 Alterar Senha</h4>
      <div class="field"><label>Senha Atual</label><input type="password" id="f-senha-atual"/></div>
      <div class="field"><label>Nova Senha</label><input type="password" id="f-senha-nova"/></div>
      <div class="field"><label>Confirmar Nova Senha</label><input type="password" id="f-senha-conf"/></div>
      <button class="btn btn-primary" onclick="alterarSenha()">Salvar Nova Senha</button>
    </div>`;
}

window.alterarSenha = async () => {
  const atual=$('f-senha-atual').value, nova=$('f-senha-nova').value, conf=$('f-senha-conf').value;
  if(atual!==currentUser.senha) return alert('Senha atual incorreta.');
  if(nova.length<4) return alert('Nova senha deve ter pelo menos 4 caracteres.');
  if(nova!==conf) return alert('As senhas não coincidem.');
  await fbUpd('usuarios',currentUser.id,{senha:nova});
  currentUser.senha=nova;
  toast('Senha alterada com sucesso! ✅');
  $('f-senha-atual').value=''; $('f-senha-nova').value=''; $('f-senha-conf').value='';
};

// ══════════════════════════════════════════════════════════════════════════
// ÁREA DO MOTORISTA
// ══════════════════════════════════════════════════════════════════════════
function iniciarMotorista(user){
  $('motorista-app').classList.remove('hidden');
  const mot=null;
  fbListen('motoristas', mots=>{
    state.motoristas=mots;
    const m=mots.find(x=>x.id===user.motorista_id);
    if(m){ $('mot-nome').textContent='Olá, '+m.nome.split(' ')[0]+'! 👋'; }
    fbListen('carros', carros=>{
      state.carros=carros;
      const carro=carros.find(c=>c.motorista_id===user.motorista_id);
      $('mot-carro').textContent=carro?'🚗 '+carro.modelo+' — '+carro.placa:'Nenhum veículo vinculado';
      fbListen('pagamentos', pags=>{
        state.pagamentos=pags;
        fbListen('multas', multas=>{
          state.multas=multas;
          fbListen('manutencoes', mans=>{
            state.manutencoes=mans;
            renderMotoristaHome(user, m, carro, pags, multas, mans);
          });
        });
      });
    });
  });
}

function renderMotoristaHome(user, mot, carro, pags, multas, mans){
  if(!mot||!carro){ $('mot-content').innerHTML=`<div class="mot-card"><p style="color:#6b7280;text-align:center;padding:20px">Nenhum veículo vinculado ao seu cadastro.<br>Entre em contato com a MGP Locadora.</p></div>`; return; }

  const meusPags=pags.filter(p=>p.motorista_id===user.motorista_id||p.carro_id===carro?.id);
  const totalPago=meusPags.reduce((a,p)=>a+Number(p.valor||0),0);

  // Pagamentos da semana atual
  const agora=new Date();
  const inicioSemana=new Date(agora); inicioSemana.setDate(agora.getDate()-agora.getDay());
  const pagsSemana=meusPags.filter(p=>{ const d=new Date(p.data+'T12:00:00'); return d>=inicioSemana; });
  const totalSemana=pagsSemana.reduce((a,p)=>a+Number(p.valor||0),0);

  const minhasMultas=multas.filter(m=>m.carro_id===carro?.id);
  const multasPend=minhasMultas.filter(m=>!m.pago);
  const minhasMans=mans.filter(m=>m.carro_id===carro?.id);
  const proximaOleo=minhasMans.filter(m=>m.tipo==='Troca de óleo').sort((a,b)=>new Date(b.data)-new Date(a.data))[0];

  $('mot-content').innerHTML=`
    <!-- RESUMO FINANCEIRO -->
    <div class="mot-stat">
      <div style="font-size:13px;opacity:.8;margin-bottom:4px">💰 Total Pago (histórico)</div>
      <div style="font-size:28px;font-weight:800">R$ ${totalPago.toFixed(2).replace('.',',')}</div>
      <div style="font-size:13px;opacity:.8;margin-top:8px">Esta semana: R$ ${totalSemana.toFixed(2).replace('.',',')}</div>
    </div>

    <!-- STATUS DO CARRO -->
    <div class="mot-card">
      <div style="font-weight:700;font-size:15px;margin-bottom:10px">🚗 Seu Veículo</div>
      <div style="font-size:14px"><b>${carro.modelo}</b> — ${carro.placa}</div>
      <div style="font-size:13px;color:#6b7280">Ano: ${carro.ano||'—'} | Cor: ${carro.cor||'—'}</div>
      ${proximaOleo?`<div style="font-size:13px;margin-top:8px;color:#f59e0b">🔧 Última troca de óleo: ${fmt(proximaOleo.data)} ${proximaOleo.proxima_km?'| Próxima: '+proximaOleo.proxima_km+' km':''}</div>`:''}
    </div>

    <!-- PAGAMENTOS RECENTES -->
    <div class="mot-card">
      <div style="font-weight:700;font-size:15px;margin-bottom:10px">📋 Últimos Pagamentos</div>
      ${meusPags.length===0?'<p style="color:#9ca3af;font-size:13px">Nenhum pagamento registrado.</p>':''}
      ${meusPags.slice(0,5).map(p=>`
        <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f3f4f6">
          <div>
            <div style="font-size:14px;font-weight:600;color:#10b981">R$ ${Number(p.valor).toFixed(2).replace('.',',')}</div>
            <div style="font-size:12px;color:#6b7280">${fmt(p.data)} · ${p.forma||'—'}</div>
            ${p.descricao?`<div style="font-size:12px;color:#9ca3af">${p.descricao}</div>`:''}
          </div>
          <span class="badge" style="background:#10b98122;color:#10b981">✓ Pago</span>
        </div>`).join('')}
    </div>

    <!-- MULTAS -->
    ${multasPend.length>0?`<div class="mot-card" style="border-left:4px solid #ef4444">
      <div style="font-weight:700;font-size:15px;margin-bottom:10px;color:#ef4444">🚨 Multas Pendentes (${multasPend.length})</div>
      ${multasPend.map(m=>`<div style="padding:8px 0;border-bottom:1px solid #f3f4f6">
        <div style="font-size:14px;font-weight:600">${m.descricao}</div>
        <div style="font-size:12px;color:#6b7280">${fmt(m.data)} ${m.vencimento?'| Vence: '+fmt(m.vencimento):''}</div>
        ${m.valor?`<div style="font-size:13px;color:#ef4444;font-weight:600">R$ ${Number(m.valor).toFixed(2).replace('.',',')} ${m.pontos?'| '+m.pontos+' pontos CNH':''}</div>`:''}
        <div style="font-size:12px;color:#6b7280">${m.resp==='motorista'?'⚠️ Você é responsável pelo pagamento':'✅ MGP paga esta multa'}</div>
      </div>`).join('')}
    </div>`:''}

    <!-- MANUTENÇÕES -->
    ${minhasMans.length>0?`<div class="mot-card">
      <div style="font-weight:700;font-size:15px;margin-bottom:10px">🔧 Manutenções do Veículo</div>
      ${minhasMans.slice(0,3).map(m=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f3f4f6">
        <div>
          <div style="font-size:14px;font-weight:600">${m.tipo}</div>
          <div style="font-size:12px;color:#6b7280">${fmt(m.data)} ${m.km?'| KM: '+m.km:''}</div>
        </div>
        <span class="badge" style="background:${m.ok?'#10b98122':'#f59e0b22'};color:${m.ok?'#10b981':'#f59e0b'}">${m.ok?'✓ Feito':'Pendente'}</span>
      </div>`).join('')}
    </div>`:''}

    <!-- CONTATO -->
    <div class="mot-card" style="text-align:center">
      <div style="font-weight:700;font-size:15px;margin-bottom:8px">📞 Precisa de ajuda?</div>
      <p style="font-size:13px;color:#6b7280;margin-bottom:14px">Entre em contato com a MGP Locadora</p>
      <a href="https://wa.me/55" style="background:#25d366;color:#fff;border-radius:10px;padding:10px 24px;font-weight:700;font-size:14px;text-decoration:none;display:inline-block">💬 WhatsApp MGP</a>
    </div>

    <!-- TROCAR SENHA -->
    <div class="mot-card">
      <div style="font-weight:700;font-size:15px;margin-bottom:12px">🔑 Alterar Minha Senha</div>
      <div class="field"><label>Senha Atual</label><input type="password" id="mot-senha-atual"/></div>
      <div class="field"><label>Nova Senha</label><input type="password" id="mot-senha-nova"/></div>
      <div class="field"><label>Confirmar Senha</label><input type="password" id="mot-senha-conf"/></div>
      <button class="btn btn-primary" onclick="alterarSenhaMot()">Salvar</button>
    </div>`;
}

window.alterarSenhaMot = async () => {
  const atual=$('mot-senha-atual').value, nova=$('mot-senha-nova').value, conf=$('mot-senha-conf').value;
  if(atual!==currentUser.senha) return alert('Senha atual incorreta.');
  if(nova.length<4) return alert('Nova senha deve ter pelo menos 4 caracteres.');
  if(nova!==conf) return alert('As senhas não coincidem.');
  await fbUpd('usuarios',currentUser.id,{senha:nova});
  currentUser.senha=nova;
  toast('Senha alterada! ✅');
};

// ── INIT ──────────────────────────────────────────────────────────────────
inicializarUsuarios();
</script>
