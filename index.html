<script>
(function(){
  const c=document.createElement('canvas');c.width=180;c.height=180;
  const ctx=c.getContext('2d');
  const g=ctx.createLinearGradient(0,0,180,180);
  g.addColorStop(0,'#0f2544');g.addColorStop(1,'#2563eb');
  ctx.fillStyle=g;
  ctx.beginPath();ctx.moveTo(20,0);ctx.lineTo(160,0);ctx.quadraticCurveTo(180,0,180,20);
  ctx.lineTo(180,160);ctx.quadraticCurveTo(180,180,160,180);ctx.lineTo(20,180);
  ctx.quadraticCurveTo(0,180,0,160);ctx.lineTo(0,20);ctx.quadraticCurveTo(0,0,20,0);
  ctx.closePath();ctx.fill();
  ctx.fillStyle='#ffffff';ctx.textAlign='center';
  ctx.font='bold 72px Arial Black, Arial';ctx.fillText('MGP',90,85);
  ctx.font='bold 18px Arial';ctx.fillText('LOCADORA',90,115);
  ctx.font='14px Arial';ctx.fillText('DE VEÍCULOS',90,138);
  const url=c.toDataURL('image/png');
  const l=document.createElement('link');l.rel='apple-touch-icon';l.href=url;document.head.appendChild(l);
  const l2=document.createElement('link');l2.rel='icon';l2.type='image/png';l2.href=url;document.head.appendChild(l2);
  const manifest={name:'MGP Locadora',short_name:'MGP',start_url:'/',display:'standalone',background_color:'#1e3a5f',theme_color:'#1e3a5f',icons:[{src:url,sizes:'180x180',type:'image/png'}]};
  const mb=document.createElement('link');mb.rel='manifest';mb.href='data:application/json,'+encodeURIComponent(JSON.stringify(manifest));document.head.appendChild(mb);
})();
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCiyTqzSeCPG_SPaSqe7RFDbuYGO15RAj8",
  authDomain: "frota-carros-67e9e.firebaseapp.com",
  projectId: "frota-carros-67e9e",
  storageBucket: "frota-carros-67e9e.firebasestorage.app",
  messagingSenderId: "708276056895",
  appId: "1:708276056895:web:890c4f40df6b8d961d198a"
};

const fb=initializeApp(firebaseConfig);
const db=getFirestore(fb);

let state={carros:[],motoristas:[],pagamentos:[],manutencoes:[],multas:[],usuarios:[],jornadas:[],abastecimentos:[]};
let currentPage='dashboard',currentUser=null,motAba='hoje',jornadaTimer=null;

const fmt=d=>d?new Date(d+'T12:00:00').toLocaleDateString('pt-BR'):'—';
const fmtR=v=>'R$ '+Number(v||0).toFixed(2).replace('.',',');
const todayStr=()=>new Date().toISOString().split('T')[0];
const $=id=>document.getElementById(id);
const toast=msg=>{const t=$('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);};

const processarDocs=async files=>{
  const res=[];
  for(const f of Array.from(files)){
    await new Promise(resolve=>{
      if(f.type==='application/pdf'){
        if(f.size>500*1024){toast('⚠️ PDF muito grande. Use foto!');resolve();return;}
        const fr=new FileReader();fr.onload=e=>{res.push({name:f.name,type:f.type,data:e.target.result});resolve();};fr.readAsDataURL(f);
      } else if(f.type.startsWith('image/')){
        const fr=new FileReader();fr.onload=e=>{
          const img=new Image();img.onload=()=>{
            let w=img.width,h=img.height;
            if(w>800||h>800){const r=Math.min(800/w,800/h);w=Math.round(w*r);h=Math.round(h*r);}
            const cv=document.createElement('canvas');cv.width=w;cv.height=h;
            cv.getContext('2d').drawImage(img,0,0,w,h);
            res.push({name:f.name,type:'image/jpeg',data:cv.toDataURL('image/jpeg',0.7)});resolve();
          };img.src=e.target.result;
        };fr.readAsDataURL(f);
      } else resolve();
    });
  }
  return res;
};

const fbAdd=async(col,data)=>{const r=await addDoc(collection(db,col),{...data,criadoEm:new Date().toISOString()});return r.id;};
const fbDel=async(col,id)=>deleteDoc(doc(db,col,id));
const fbUpd=async(col,id,data)=>updateDoc(doc(db,col,id),data);
const fbListen=(col,cb)=>onSnapshot(collection(db,col),snap=>{const d=[];snap.forEach(x=>d.push({id:x.id,...x.data()}));cb(d);});

async function inicializarUsuarios(){
  const snap=await getDocs(collection(db,'usuarios'));
  if(snap.empty)await fbAdd('usuarios',{nome:'Administrador',login:'admin',telefone:'',senha:'mgp123',perfil:'admin',ativo:true});
}

// ── SESSÃO ────────────────────────────────────────────────────────────────
function salvarSessao(u){try{localStorage.setItem('mgp_s',JSON.stringify({id:u.id,senha:u.senha,perfil:u.perfil,nome:u.nome,login:u.login,telefone:u.telefone||'',motorista_id:u.motorista_id||'',ativo:u.ativo}));}catch(e){}}
function limparSessao(){try{localStorage.removeItem('mgp_s');}catch(e){}}
async function verificarSessao(){
  try{
    const s=localStorage.getItem('mgp_s');if(!s)return false;
    const sv=JSON.parse(s);
    const snap=await getDocs(collection(db,'usuarios'));
    let found=null;
    snap.forEach(d=>{const x={id:d.id,...d.data()};if(x.id===sv.id&&x.senha===sv.senha&&x.ativo!==false)found=x;});
    if(!found){limparSessao();return false;}
    currentUser=found;salvarSessao(found);
    $('login-screen').classList.add('hidden');
    if(found.perfil==='motorista')iniciarMotorista(found);
    else iniciarAdmin(found);
    return true;
  }catch(e){return false;}
}

// ── AUTH ──────────────────────────────────────────────────────────────────
window.doLogin=async()=>{
  const u=$('login-user').value.trim().toLowerCase(),s=$('login-pass').value;
  if(!u||!s){$('login-err').style.display='block';return;}
  const snap=await getDocs(collection(db,'usuarios'));
  let found=null;
  snap.forEach(d=>{const x={id:d.id,...d.data()};if((x.login?.toLowerCase()===u||x.telefone===u)&&x.senha===s&&x.ativo!==false)found=x;});
  if(!found){$('login-err').style.display='block';return;}
  currentUser=found;$('login-err').style.display='none';
  if($('lembrar-me')?.checked)salvarSessao(found);
  $('login-screen').classList.add('hidden');
  if(found.perfil==='motorista')iniciarMotorista(found);
  else iniciarAdmin(found);
};
window.doLogout=()=>{

// ── ALERTAS ───────────────────────────────────────────────────────────────
function gerarAlertas(){
  const {carros,motoristas,multas}=state;
  const alertas=[];
  const hoje=new Date(),em30=new Date(hoje),em7=new Date(hoje);
  em30.setDate(hoje.getDate()+30);em7.setDate(hoje.getDate()+7);
  motoristas.forEach(m=>{
    if(!m.cnh_validade)return;
    const v=new Date(m.cnh_validade+'T12:00:00');
    if(v<=em7)alertas.push({tipo:'red',msg:`🪪 CNH de <b>${m.nome}</b> vence em ${fmt(m.cnh_validade)}! Urgente!`,acao:null});
    else if(v<=em30)alertas.push({tipo:'yellow',msg:`🪪 CNH de <b>${m.nome}</b> vence em ${fmt(m.cnh_validade)}.`,acao:null});
  });
  carros.forEach(c=>{
    if(c.ipva_vencimento&&!c.ipva_pago){
      const v=new Date(c.ipva_vencimento+'T12:00:00');
      if(v<=em7)alertas.push({tipo:'red',msg:`📋 IPVA <b>${c.modelo} ${c.placa}</b> vence ${fmt(c.ipva_vencimento)}!`,acao:`resolverAlerta('carros','${c.id}','ipva_pago')`});
      else if(v<=em30)alertas.push({tipo:'yellow',msg:`📋 IPVA <b>${c.modelo} ${c.placa}</b> vence ${fmt(c.ipva_vencimento)}.`,acao:`resolverAlerta('carros','${c.id}','ipva_pago')`});
    }
    if(c.seguro_vencimento&&!c.seguro_pago){
      const v=new Date(c.seguro_vencimento+'T12:00:00');
      if(v<=em7)alertas.push({tipo:'red',msg:`🛡️ Seguro <b>${c.modelo} ${c.placa}</b> vence ${fmt(c.seguro_vencimento)}!`,acao:`resolverAlerta('carros','${c.id}','seguro_pago')`});
      else if(v<=em30)alertas.push({tipo:'yellow',msg:`🛡️ Seguro <b>${c.modelo} ${c.placa}</b> vence ${fmt(c.seguro_vencimento)}.`,acao:`resolverAlerta('carros','${c.id}','seguro_pago')`});
    }
  });
  multas.filter(m=>!m.pago&&m.vencimento).forEach(m=>{
    const v=new Date(m.vencimento+'T12:00:00');
    if(v<=em7)alertas.push({tipo:'red',msg:`🚨 Multa <b>${m.descricao}</b> (${m.placa}) vence ${fmt(m.vencimento)}!`,acao:`toggleMulta('${m.id}',true)`});
  });
  return alertas;
}

    {l:'Manutenções Pend.',v:manutencoes.filter(m=>!m.ok).length,e:'🔧',c:'#06b6d4'},

    <h3 style="color:#1e3a5f;margin-bottom:12px">Frota</h3>

        ${c.seguro_vencimento&&!c.seguro_pago&&new Date(c.seguro_vencimento+'T12:00:00')<=new Date(new Date().setDate(new Date().getDate()+30))?`<div style="font-size:12px;color:#f59e0b;margin-top:2px">⚠️ Seguro vence ${fmt(c.seguro_vencimento)}</div>`:''}

function renderROI(){
  const {carros,motoristas,pagamentos}=state;
  if(!carros.length)return'<p class="empty">Nenhum veículo cadastrado.</p>';
  return carros.map(c=>{
    const compra=Number(c.valor_compra||0),revenda=Number(c.valor_revenda||0),vidaUtil=Number(c.vida_util_km||200000);
    const recTotal=pagamentos.filter(p=>p.carro_id===c.id).reduce((a,p)=>a+Number(p.valor||0),0);
    const custKm=vidaUtil>0?((compra-revenda)/vidaUtil):0;
    const roi=compra>0?((recTotal/compra)*100):0;
    const payback=recTotal>0?(compra/recTotal):0;
    const mot=motoristas.find(m=>m.id===c.motorista_id);
    return `<div class="card accent-blue">
      <div style="font-weight:700;font-size:15px;margin-bottom:10px">${c.modelo} — ${c.placa} ${mot?`<span style="color:#6b7280;font-size:13px">| ${mot.nome}</span>`:''}</div>
      <div class="grid2" style="gap:8px">
        <div style="background:#f9fafb;border-radius:8px;padding:10px;text-align:center"><div style="font-size:15px;font-weight:700;color:#2563eb">${fmtR(compra)}</div><div style="font-size:11px;color:#6b7280">Valor compra</div></div>
        <div style="background:#f9fafb;border-radius:8px;padding:10px;text-align:center"><div style="font-size:15px;font-weight:700;color:#10b981">${fmtR(recTotal)}</div><div style="font-size:11px;color:#6b7280">Total recebido</div></div>
        <div style="background:#f9fafb;border-radius:8px;padding:10px;text-align:center"><div style="font-size:15px;font-weight:700;color:#8b5cf6">${roi.toFixed(1)}%</div><div style="font-size:11px;color:#6b7280">ROI acumulado</div></div>
        <div style="background:#f9fafb;border-radius:8px;padding:10px;text-align:center"><div style="font-size:15px;font-weight:700;color:#f59e0b">${payback.toFixed(1)} meses</div><div style="font-size:11px;color:#6b7280">Payback</div></div>
        <div style="background:#f9fafb;border-radius:8px;padding:10px;text-align:center"><div style="font-size:15px;font-weight:700;color:#06b6d4">R$ ${custKm.toFixed(3).replace('.',',')}/km</div><div style="font-size:11px;color:#6b7280">Deprec./km</div></div>
      </div>
    </div>`;
  }).join('');
}

function calcScore(mot){
  const {jornadas,multas,carros}=state;
  const jM=jornadas.filter(j=>j.motorista_id===mot.id);
  const carro=carros.find(c=>c.motorista_id===mot.id);
  const mults=multas.filter(m=>m.carro_id===carro?.id&&!m.pago).length;
  const bruto=jM.reduce((a,j)=>a+Number(j.bruto||0),0);
  const horas=jM.reduce((a,j)=>a+Number(j.horas||0),0);
  const km=jM.reduce((a,j)=>a+Number(j.km||0),0);
  const gastos=jM.reduce((a,j)=>a+(j.gastos||[]).reduce((b,g)=>b+Number(g.valor||0),0),0);
  const lucro=bruto-gastos;
  const lH=horas>0?(lucro/horas):0,lK=km>0?(lucro/km):0;
  const score=Math.round(Math.min(100,(lH/20)*100)*0.35+Math.min(100,(lK/0.5)*100)*0.35+Math.max(0,100-mults*20)*0.30);
  return {score,lH,lK,mults};
}

function renderScore(){
  const {motoristas}=state;
  if(!motoristas.length)return'<p class="empty">Nenhum motorista.</p>';
  const rank=motoristas.map(m=>({...m,...calcScore(m)})).sort((a,b)=>b.score-a.score);
  const med=['🥇','🥈','🥉'];
  return rank.map((m,i)=>{
    const cor=m.score>=70?'#10b981':m.score>=40?'#f59e0b':'#ef4444';
    return `<div class="card"><div style="display:flex;align-items:center;gap:14px">
      <div style="font-size:28px">${med[i]||'🏅'}</div>
      <div style="flex:1">
        <div style="font-weight:700;font-size:15px">${m.nome_ficticio||m.nome.split(' ')[0]}</div>
        <div class="progress-bar" style="margin:6px 0"><div class="progress-fill" style="width:${m.score}%;background:${cor}"></div></div>
        <div style="display:flex;justify-content:space-between;font-size:12px;color:#6b7280;flex-wrap:wrap;gap:4px">
          <span>Score: <b style="color:${cor}">${m.score}/100</b></span>
          <span>${fmtR(m.lH)}/h</span><span>R$ ${m.lK.toFixed(2).replace('.',',')}/km</span>
          <span>${m.mults} multa(s)</span>
        </div>
      </div>
    </div></div>`;
  }).join('');
}

function renderDRE(){
  const {carros,motoristas,pagamentos,jornadas}=state;
  const agora=new Date();
  const jMes=jornadas.filter(j=>{const d=new Date(j.data+'T12:00:00');return d.getMonth()===agora.getMonth()&&d.getFullYear()===agora.getFullYear();});
  const recTotal=pagamentos.reduce((a,p)=>a+Number(p.valor||0),0);
  const gastos=jMes.reduce((a,j)=>a+(j.gastos||[]).reduce((b,g)=>b+Number(g.valor||0),0),0);
  const fatMot=jMes.reduce((a,j)=>a+Number(j.bruto||0),0);
  const lucro=recTotal-gastos;
  return `<div class="card accent-purple">
    <div style="font-weight:700;font-size:16px;margin-bottom:16px">📊 DRE — ${agora.toLocaleString('pt-BR',{month:'long',year:'numeric'})}</div>
    <div style="font-size:14px;line-height:2.2">
      <div style="display:flex;justify-content:space-between"><span>💰 Receita Aluguéis</span><span style="font-weight:700;color:#10b981">${fmtR(recTotal)}</span></div>
      <div style="display:flex;justify-content:space-between"><span>🚗 Faturamento Motoristas</span><span style="font-weight:700;color:#2563eb">${fmtR(fatMot)}</span></div>
      <div style="border-top:1px dashed #e5e7eb;margin:4px 0"></div>
      <div style="display:flex;justify-content:space-between"><span>📤 Custos Operacionais</span><span style="font-weight:700;color:#ef4444">- ${fmtR(gastos)}</span></div>
      <div style="border-top:2px solid #e5e7eb;margin:4px 0"></div>
      <div style="display:flex;justify-content:space-between"><span style="font-weight:700">💵 Lucro Operacional</span><span style="font-weight:800;color:${lucro>=0?'#10b981':'#ef4444'}">${fmtR(lucro)}</span></div>

  </div>`;
}

function iniciarMotorista(user){
  $('motorista-app').classList.remove('hidden');
  window._motDataSel=todayStr();
  ['motoristas','carros','pagamentos','multas','manutencoes','jornadas'].forEach(col=>{
    fbListen(col,d=>{state[col]=d;renderMotPage(user);});
  });
}

function renderMotPage(user){
  const mot=state.motoristas.find(m=>m.id===user.motorista_id);
  const carro=state.carros.find(c=>c.motorista_id===user.motorista_id);
  $('mot-nome').textContent=mot?'Olá, '+mot.nome.split(' ')[0]+'! 👋':'Olá!';
  $('mot-carro').textContent=carro?'🚗 '+carro.modelo+' — '+carro.placa:'';
  if(!mot||!carro){
    $('mot-content').innerHTML=`<div class="mot-card"><p style="color:#6b7280;text-align:center;padding:20px">Nenhum veículo vinculado.<br>Fale com a MGP Locadora.</p></div>`;
    return;
  }
  const abas=[{id:'hoje',l:'📅 Hoje'},{id:'semana',l:'📊 Semana'},{id:'mes',l:'📆 Mês'},{id:'veiculo',l:'🚗 Veículo'},{id:'cfg',l:'⚙️ Config'}];
  const tabs=`<div class="tab-bar">${abas.map(a=>`<button class="tab-btn ${motAba===a.id?'active':''}" onclick="setMotAba('${a.id}')">${a.l}</button>`).join('')}</div>`;
  let content='';
  if(motAba==='hoje')content=renderHoje(user,mot,carro);
  else if(motAba==='semana')content=renderSemana(user,carro,mot);
  else if(motAba==='mes')content=renderMes(user,carro,mot);
  else if(motAba==='veiculo')content=renderVeiculo(user,mot,carro);
  else if(motAba==='cfg')content=renderCfg(user,mot);
  $('mot-content').innerHTML=tabs+content;
  if(motAba==='hoje')startTimer(user);
}
window.setMotAba=aba=>{motAba=aba;if(currentUser)renderMotPage(currentUser);};

function getJ(user,data){
  return (state.jornadas||[]).find(j=>j.data===data&&j.motorista_id===user.motorista_id)||{gastos:[],receitas:[],bruto:0,km:0,horas:0,horas_segundos:0,corridas:0};
}

function calcJ(j,carro){
  const bruto=Number(j.bruto||0),gastos=(j.gastos||[]).reduce((a,g)=>a+Number(g.valor||0),0);
  const horas=Number(j.horas||0),km=Number(j.km||0),corridas=Number(j.corridas||0);
  const compra=Number(carro?.valor_compra||0),revenda=Number(carro?.valor_revenda||0),vu=Number(carro?.vida_util_km||200000);
  const depKm=vu>0?((compra-revenda)/vu):0,dep=depKm*km;
  const lucro=bruto-gastos-dep;
  return {bruto,gastos,horas,km,corridas,dep,lucro,
    lH:horas>0?(lucro/horas):0,lK:km>0?(lucro/km):0,
    gK:km>0?(bruto/km):0,cK:km>0?((gastos+dep)/km):0,
    mC:corridas>0?(bruto/corridas):0};
}

// ── ABA SEMANA ────────────────────────────────────────────────────────────
function renderSemana(user,carro,mot){
  const agora=new Date();
  const ini=new Date(agora);ini.setDate(agora.getDate()-agora.getDay());
  const fim=new Date(ini);fim.setDate(ini.getDate()+6);
  const jS=(state.jornadas||[]).filter(j=>{const d=new Date(j.data+'T12:00:00');return d>=ini&&d<=fim&&j.motorista_id===user.motorista_id;});
  const tot=jS.reduce((a,j)=>{const d=calcJ(j,carro);return{bruto:a.bruto+d.bruto,gastos:a.gastos+d.gastos,km:a.km+d.km,horas:a.horas+d.horas,lucro:a.lucro+d.lucro,corridas:a.corridas+Number(j.corridas||0)};},{bruto:0,gastos:0,km:0,horas:0,lucro:0,corridas:0});
  const cfg=mot.config||{};
  const alug=Number(cfg.aluguel_semanal||0);
  const lFinal=tot.lucro-alug;
  const meta=Number(cfg.meta_semanal||0);
  const prog=meta>0?Math.min(100,(tot.bruto/meta)*100):0;
  return `
  ${meta>0?`<div class="mot-card">
    <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px"><span style="font-weight:600">🎯 Meta Semanal: ${fmtR(meta)}</span><span style="font-weight:700;color:${prog>=100?'#10b981':'#2563eb'}">${prog.toFixed(0)}%</span></div>
    <div class="progress-bar"><div class="progress-fill" style="width:${prog}%;background:${prog>=100?'#10b981':'#2563eb'}"></div></div>
    <div style="font-size:12px;color:#6b7280;margin-top:4px">${prog<100?'Falta '+fmtR(meta-tot.bruto):'🎉 Meta atingida!'}</div>
  </div>`:''}
  <div class="mot-stat"><div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
    <div style="text-align:center"><div style="font-size:11px;opacity:.8">Sem aluguel</div><div style="font-size:22px;font-weight:800">${fmtR(tot.lucro)}</div></div>
    <div style="text-align:center"><div style="font-size:11px;opacity:.8">Com aluguel</div><div style="font-size:22px;font-weight:800">${fmtR(lFinal)}</div></div>
  </div></div>
  <div class="kpi-grid">
    <div class="kpi"><div class="val" style="color:#10b981">${fmtR(tot.bruto)}</div><div class="lbl">Faturamento</div></div>
    <div class="kpi"><div class="val" style="color:#ef4444">${fmtR(tot.gastos)}</div><div class="lbl">Saídas</div></div>
    <div class="kpi"><div class="val" style="color:#8b5cf6">${fmtR(tot.horas>0?tot.lucro/tot.horas:0)}/h</div><div class="lbl">Lucro/hora</div></div>
    <div class="kpi"><div class="val" style="color:#374151">${tot.km} km</div><div class="lbl">KM rodados</div></div>
    <div class="kpi"><div class="val" style="color:#374151">${tot.horas.toFixed(1)}h</div><div class="lbl">Horas</div></div>
    <div class="kpi"><div class="val" style="color:#f59e0b">${tot.corridas}</div><div class="lbl">Corridas</div></div>
  </div>
  <div class="mot-card"><div style="font-weight:700;margin-bottom:10px">📅 Dias da Semana</div>
    ${jS.length===0?'<p style="color:#9ca3af;font-size:13px;text-align:center">Nenhum dia lançado.</p>':''}
    ${jS.sort((a,b)=>new Date(b.data)-new Date(a.data)).map(j=>{const d=calcJ(j,carro);return`<div style="padding:9px 0;border-bottom:1px solid #f3f4f6">
      <div style="display:flex;justify-content:space-between"><span style="font-size:13px;font-weight:600">${fmt(j.data)}</span><span style="font-size:13px;font-weight:700;color:${d.lucro>=0?'#10b981':'#ef4444'}">${fmtR(d.lucro)}</span></div>
      <div style="font-size:12px;color:#6b7280">Bruto:${fmtR(d.bruto)} | Saídas:${fmtR(d.gastos)} | ${d.km}km | ${d.horas}h</div>
    </div>`;}).join('')}
  </div>`;
}

// ── ABA MÊS ───────────────────────────────────────────────────────────────
function renderMes(user,carro,mot){
  const agora=new Date();
  const jM=(state.jornadas||[]).filter(j=>{const d=new Date(j.data+'T12:00:00');return d.getMonth()===agora.getMonth()&&d.getFullYear()===agora.getFullYear()&&j.motorista_id===user.motorista_id;});
  const tot=jM.reduce((a,j)=>{const d=calcJ(j,carro);return{bruto:a.bruto+d.bruto,gastos:a.gastos+d.gastos,km:a.km+d.km,horas:a.horas+d.horas,lucro:a.lucro+d.lucro,corridas:a.corridas+Number(j.corridas||0)};},{bruto:0,gastos:0,km:0,horas:0,lucro:0,corridas:0});
  const cfg=mot.config||{};
  const alug=Number(cfg.aluguel_semanal||0)*4;
  const lFinal=tot.lucro-alug;
  const meta=Number(cfg.meta_mensal||0);
  const prog=meta>0?Math.min(100,(tot.bruto/meta)*100):0;
  const dias=jM.filter(j=>j.bruto>0).length;
  const mediaDia=dias>0?(tot.bruto/dias):0;
  const diasRest=new Date(agora.getFullYear(),agora.getMonth()+1,0).getDate()-agora.getDate();
  const prev=tot.bruto+(mediaDia*diasRest);
  const porCat={};jM.forEach(j=>(j.gastos||[]).forEach(g=>{porCat[g.categoria]=(porCat[g.categoria]||0)+Number(g.valor||0);}));
  return `
  ${meta>0?`<div class="mot-card">
    <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px"><span style="font-weight:600">🎯 Meta Mensal: ${fmtR(meta)}</span><span style="font-weight:700;color:${prog>=100?'#10b981':'#2563eb'}">${prog.toFixed(0)}%</span></div>
    <div class="progress-bar"><div class="progress-fill" style="width:${prog}%;background:${prog>=100?'#10b981':'#2563eb'}"></div></div>
  </div>`:''}
  <div class="mot-stat"><div style="font-size:12px;opacity:.8;margin-bottom:6px">📆 ${agora.toLocaleString('pt-BR',{month:'long',year:'numeric'})}</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div style="text-align:center"><div style="font-size:11px;opacity:.8">Sem aluguel</div><div style="font-size:22px;font-weight:800">${fmtR(tot.lucro)}</div></div>
      <div style="text-align:center"><div style="font-size:11px;opacity:.8">Com aluguel</div><div style="font-size:22px;font-weight:800">${fmtR(lFinal)}</div></div>
    </div>
  </div>
  <div class="kpi-grid">
    <div class="kpi"><div class="val" style="color:#10b981">${fmtR(tot.bruto)}</div><div class="lbl">Faturamento</div></div>
    <div class="kpi"><div class="val" style="color:#ef4444">${fmtR(tot.gastos)}</div><div class="lbl">Saídas</div></div>
    <div class="kpi"><div class="val" style="color:#f59e0b">${dias} dias</div><div class="lbl">Dias trab.</div></div>
    <div class="kpi"><div class="val" style="color:#2563eb">${fmtR(mediaDia)}</div><div class="lbl">Média/dia</div></div>
    <div class="kpi"><div class="val" style="color:#8b5cf6">${fmtR(tot.horas>0?tot.lucro/tot.horas:0)}/h</div><div class="lbl">Lucro/hora</div></div>
    <div class="kpi"><div class="val" style="color:#10b981">${fmtR(prev)}</div><div class="lbl">Previsão mês</div></div>
  </div>
  ${Object.keys(porCat).length>0?`<div class="mot-card"><div style="font-weight:700;margin-bottom:10px">📤 Saídas por Categoria</div>
    ${Object.entries(porCat).sort((a,b)=>b[1]-a[1]).map(([c,v])=>`<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #f3f4f6"><span style="font-size:13px">${c}</span><span style="font-size:13px;font-weight:700;color:#ef4444">${fmtR(v)}</span></div>`).join('')}
  </div>`:''}`;
}

// ── ABA VEÍCULO ───────────────────────────────────────────────────────────
function renderVeiculo(user,mot,carro){
  const multas=(state.multas||[]).filter(m=>m.carro_id===carro.id);
  const multPend=multas.filter(m=>!m.pago);
  const mans=(state.manutencoes||[]).filter(m=>m.carro_id===carro.id);
  const pags=(state.pagamentos||[]).filter(p=>p.carro_id===carro.id);
  const totalPago=pags.reduce((a,p)=>a+Number(p.valor||0),0);
  return `
  <div class="mot-card"><div style="font-weight:700;font-size:15px;margin-bottom:8px">🚗 Meu Veículo</div>
    <div style="font-size:15px;font-weight:700">${carro.modelo} — ${carro.placa}</div>
    <div style="font-size:13px;color:#6b7280">Ano:${carro.ano||'—'} | Cor:${carro.cor||'—'}</div>
  </div>
  <div class="mot-card"><div style="font-weight:700;margin-bottom:10px">💰 Pagamentos do Aluguel</div>
    <div style="font-size:20px;font-weight:800;color:#10b981;margin-bottom:8px">${fmtR(totalPago)} total pago</div>
    ${pags.slice(0,5).map(p=>`<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #f3f4f6">
      <div><div style="font-size:13px;font-weight:600;color:#10b981">${fmtR(p.valor)}</div><div style="font-size:12px;color:#6b7280">${fmt(p.data)} · ${p.forma||'—'}</div></div>
      <span class="badge" style="background:#10b98122;color:#10b981">✓</span>
    </div>`).join('')}
  </div>
  ${multPend.length>0?`<div class="mot-card" style="border-left:4px solid #ef4444">
    <div style="font-weight:700;color:#ef4444;margin-bottom:10px">🚨 Multas Pendentes (${multPend.length})</div>
    ${multPend.map(m=>`<div style="padding:8px 0;border-bottom:1px solid #f3f4f6">
      <div style="font-size:13px;font-weight:600">${m.descricao}</div>
      ${m.valor?`<div style="font-size:13px;color:#ef4444;font-weight:600">${fmtR(m.valor)}</div>`:''}
      <div style="font-size:12px;color:#6b7280">${m.resp==='motorista'?'⚠️ Você paga':'✅ MGP paga'}</div>
    </div>`).join('')}
  </div>`:`<div class="mot-card" style="border-left:4px solid #10b981"><div style="color:#10b981;font-weight:700">✅ Nenhuma multa pendente!</div></div>`}
  ${mans.length>0?`<div class="mot-card"><div style="font-weight:700;margin-bottom:10px">🔧 Manutenções</div>
    ${mans.slice(0,5).map(m=>`<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f3f4f6">
      <div><div style="font-size:13px;font-weight:600">${m.tipo}</div><div style="font-size:12px;color:#6b7280">${fmt(m.data)}</div></div>
      <span class="badge" style="background:${m.ok?'#10b98122':'#f59e0b22'};color:${m.ok?'#10b981':'#f59e0b'}">${m.ok?'✓':'Pend.'}</span>
    </div>`).join('')}
  </div>`:''}
  <div class="mot-card" style="text-align:center">
    <div style="font-weight:700;margin-bottom:8px">📞 Suporte MGP</div>
    <a href="https://wa.me/55" style="background:#25d366;color:#fff;border-radius:10px;padding:10px 24px;font-weight:700;font-size:14px;text-decoration:none;display:inline-block">💬 WhatsApp MGP</a>
  </div>`;
}

// ── ABA CONFIG ────────────────────────────────────────────────────────────
function renderCfg(user,mot){
  const cfg=mot.config||{};
  return `
  <div class="mot-card">
    <div style="font-weight:700;font-size:15px;margin-bottom:12px">⚙️ Configurações</div>
    <div class="field"><label>Aluguel Semanal (R$)</label><input type="number" id="cfg-alg" step="0.01" value="${cfg.aluguel_semanal||''}"/></div>
    <div class="field"><label>Meta Diária (R$)</label><input type="number" id="cfg-dia" step="0.01" value="${cfg.meta_diaria||''}"/></div>
    <div class="field"><label>Meta Semanal (R$)</label><input type="number" id="cfg-sem" step="0.01" value="${cfg.meta_semanal||''}"/></div>
    <div class="field"><label>Meta Mensal (R$)</label><input type="number" id="cfg-mes" step="0.01" value="${cfg.meta_mensal||''}"/></div>
    <div class="field"><label>🏆 Nome no Ranking</label><input id="cfg-nick" placeholder="Ex: Relâmpago..." value="${mot.nome_ficticio||''}"/></div>
    <button class="btn btn-primary btn-block" onclick="salvarCfg('${user.motorista_id}')">💾 Salvar</button>
  </div>
  <div class="mot-card">
    <div style="font-weight:700;font-size:15px;margin-bottom:12px">🔑 Alterar Senha</div>
    <div class="field"><label>Senha Atual</label><input type="password" id="ms-a"/></div>
    <div class="field"><label>Nova Senha</label><input type="password" id="ms-n"/></div>
    <div class="field"><label>Confirmar</label><input type="password" id="ms-c"/></div>
    <button class="btn btn-primary btn-block" onclick="alterarSenhaMot()">Salvar Senha</button>
  </div>`;
}

window.salvarCfg=async motId=>{
  await fbUpd('motoristas',motId,{config:{aluguel_semanal:Number($('cfg-alg')?.value||0),meta_diaria:Number($('cfg-dia')?.value||0),meta_semanal:Number($('cfg-sem')?.value||0),meta_mensal:Number($('cfg-mes')?.value||0)},nome_ficticio:$('cfg-nick')?.value||''});
  toast('Configurações salvas! ✅');
};
window.alterarSenhaMot=async()=>{
  const a=$('ms-a').value,n=$('ms-n').value,c=$('ms-c').value;
  if(a!==currentUser.senha)return alert('Senha atual incorreta.');
  if(n.length<4)return alert('Mínimo 4 caracteres.');
  if(n!==c)return alert('As senhas não coincidem.');
  await fbUpd('usuarios',currentUser.id,{senha:n});currentUser.senha=n;toast('Senha alterada! ✅');
};

// ── JORNADA ───────────────────────────────────────────────────────────────
window.iniciarJ=async(motId,data)=>{
  const j=(state.jornadas||[]).find(x=>x.data===data&&x.motorista_id===motId);
  const agora=new Date().toISOString();
  if(j)await fbUpd('jornadas',j.id,{jornada_ativa:true,jornada_inicio:agora});
  else await fbAdd('jornadas',{motorista_id:motId,data,jornada_ativa:true,jornada_inicio:agora,horas_segundos:0,bruto:0,km:0,horas:0,corridas:0,gastos:[],receitas:[]});
  toast('Jornada iniciada! ✅');
};
window.pausarJ=async(motId,data)=>{
  const j=(state.jornadas||[]).find(x=>x.data===data&&x.motorista_id===motId);if(!j)return;
  const segs=Math.floor((new Date()-new Date(j.jornada_inicio))/1000);
  await fbUpd('jornadas',j.id,{jornada_ativa:false,jornada_inicio:null,horas_segundos:(j.horas_segundos||0)+segs});
  toast('Pausado! ⏸');
};
window.zerarJ=async(motId,data)=>{
  if(!confirm('Zerar cronômetro?'))return;
  const j=(state.jornadas||[]).find(x=>x.data===data&&x.motorista_id===motId);
  if(j)await fbUpd('jornadas',j.id,{jornada_ativa:false,jornada_inicio:null,horas_segundos:0,horas:0});
  toast('Zerado! 🔄');
};
window.salvarFat=async(motId,data)=>{
  const bruto=Number($('mot-bruto')?.value||0),km=Number($('mot-km')?.value||0),horas=Number($('mot-horas')?.value||0),corridas=Number($('mot-corridas')?.value||0);
  const j=(state.jornadas||[]).find(x=>x.data===data&&x.motorista_id===motId);
  if(j)await fbUpd('jornadas',j.id,{bruto,km,horas,corridas});
  else await fbAdd('jornadas',{motorista_id:motId,data,bruto,km,horas,corridas,horas_segundos:0,jornada_ativa:false,gastos:[],receitas:[]});
  toast('Salvo! ✅');
};
window.modalReceita=(motId,data)=>{
  openModal('Nova Entrada',`
    <div class="field"><label>Plataforma</label><select id="f-pl"><option>Uber</option><option>99</option><option>InDrive</option><option>Particular</option><option>Outro</option></select></div>
    <div class="field"><label>Valor (R$) *</label><input type="number" id="f-rb" step="0.01" placeholder="0,00"/></div>
    <div class="grid2"><div class="field"><label>Corridas</label><input type="number" id="f-rc" placeholder="0"/></div><div class="field"><label>KM Rodados</label><input type="number" id="f-rk" placeholder="0"/></div></div>
    <div class="field"><label>Horas Trabalhadas</label><input type="number" id="f-rh" step="0.5" placeholder="Ex: 6"/></div>
  `,async()=>{
    const bruto=Number($('f-rb').value);if(!bruto)return alert('Informe o valor.');
    const j=(state.jornadas||[]).find(x=>x.data===data&&x.motorista_id===motId);
    const r={plataforma:$('f-pl').value,bruto,corridas:Number($('f-rc').value||0),km:Number($('f-rk').value||0),horas:Number($('f-rh').value||0)};
    let novasReceitas;
    if(j){
      novasReceitas=[...(j.receitas||[]),r];
      // Recalcula totais automaticamente
      const totBruto=novasReceitas.reduce((a,x)=>a+x.bruto,0);
      const totKm=novasReceitas.reduce((a,x)=>a+x.km,0);
      const totHoras=novasReceitas.reduce((a,x)=>a+x.horas,0);
      const totCorridas=novasReceitas.reduce((a,x)=>a+x.corridas,0);
      await fbUpd('jornadas',j.id,{receitas:novasReceitas,bruto:totBruto,km:totKm,horas:totHoras,corridas:totCorridas});
    } else {
      await fbAdd('jornadas',{motorista_id:motId,data,bruto:r.bruto,km:r.km,horas:r.horas,corridas:r.corridas,horas_segundos:0,jornada_ativa:false,gastos:[],receitas:[r]});
    }
    closeModal();toast('Entrada registrada! ✅');
  });
};
window.remReceita=async(motId,data,idx)=>{
  const j=(state.jornadas||[]).find(x=>x.data===data&&x.motorista_id===motId);if(!j)return;
  const novasReceitas=j.receitas.filter((_,i)=>i!==idx);
  // Recalcula totais automaticamente
  const totBruto=novasReceitas.reduce((a,x)=>a+x.bruto,0);
  const totKm=novasReceitas.reduce((a,x)=>a+x.km,0);
  const totHoras=novasReceitas.reduce((a,x)=>a+x.horas,0);
  const totCorridas=novasReceitas.reduce((a,x)=>a+x.corridas,0);
  await fbUpd('jornadas',j.id,{receitas:novasReceitas,bruto:totBruto,km:totKm,horas:totHoras,corridas:totCorridas});
  toast('Removido.');
};
window.modalSaida=(motId,data)=>{
  openModal('Nova Saída',`
    <div class="field"><label>Categoria</label><select id="f-gc">
      <option>⛽ Combustível</option><option>🍔 Alimentação</option><option>🛣️ Pedágio</option>
      <option>🅿️ Estacionamento</option><option>🔧 Manutenção</option><option>🚿 Lavagem</option>
      <option>📱 Internet/Dados</option><option>💊 Saúde</option><option>🛒 Outros</option>
    </select></div>
    <div class="field"><label>Valor (R$) *</label><input type="number" id="f-gv" step="0.01" placeholder="0,00"/></div>
    <div class="field"><label>Descrição (opcional)</label><input id="f-gd" placeholder="Ex: Posto Shell..."/></div>
  `,async()=>{
    const val=Number($('f-gv').value);if(!val)return alert('Informe o valor.');
    const j=(state.jornadas||[]).find(x=>x.data===data&&x.motorista_id===motId);
    const g={categoria:$('f-gc').value,valor:val,descricao:$('f-gd').value};
    if(j)await fbUpd('jornadas',j.id,{gastos:[...(j.gastos||[]),g]});
    else await fbAdd('jornadas',{motorista_id:motId,data,bruto:0,km:0,horas:0,corridas:0,horas_segundos:0,jornada_ativa:false,gastos:[g],receitas:[]});
    closeModal();toast('Saída registrada! ✅');
  });
};
window.remSaida=async(motId,data,idx)=>{
  const j=(state.jornadas||[]).find(x=>x.data===data&&x.motorista_id===motId);if(!j)return;
  await fbUpd('jornadas',j.id,{gastos:j.gastos.filter((_,i)=>i!==idx)});toast('Removido.');
};

// ── TIMER ─────────────────────────────────────────────────────────────────
const fmtTempo=s=>{const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),ss=s%60;return`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;};
function startTimer(user){
  if(jornadaTimer)clearInterval(jornadaTimer);
  jornadaTimer=setInterval(()=>{
    const td=$('timer-display');if(!td)return clearInterval(jornadaTimer);
    const data=window._motDataSel||todayStr();
    const j=getJ(user,data);
    let s=j.horas_segundos||0;
    if(j.jornada_ativa&&j.jornada_inicio)s+=Math.floor((new Date()-new Date(j.jornada_inicio))/1000);
    td.textContent=fmtTempo(s);
  },1000);
}

// ── BANNER INSTALAR ───────────────────────────────────────────────────────
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();window._dProm=e;});
setTimeout(()=>{
  try{if(localStorage.getItem('mgp_bi'))return;}catch(e){}
  const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
  const isAnd=/android/i.test(navigator.userAgent);
  if(!isIOS&&!isAnd)return;
  const b=document.createElement('div');b.id='bi';
  b.style.cssText='position:fixed;bottom:0;left:0;right:0;background:#1e3a5f;color:#fff;padding:14px 16px;z-index:998;display:flex;align-items:center;gap:12px;box-shadow:0 -4px 12px rgba(0,0,0,.2)';
  b.innerHTML=`<div style="font-size:26px">📲</div><div style="flex:1"><div style="font-size:13px;font-weight:700;margin-bottom:2px">Instalar MGP Locadora</div><div style="font-size:12px;opacity:.85">${isIOS?'Toque em <b>compartilhar ↑</b> → <b>"Adicionar à Tela de Início"</b>':'Toque em <b>⋮ menu</b> → <b>"Adicionar à tela inicial"</b>'}</div></div><button onclick="document.getElementById('bi').remove();try{localStorage.setItem('mgp_bi','1')}catch(e){}" style="background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:8px;padding:6px 12px;cursor:pointer;font-size:13px;flex-shrink:0">✕</button>`;
  document.body.appendChild(b);
},3000);

inicializarUsuarios();
verificarSessao();
</script>
